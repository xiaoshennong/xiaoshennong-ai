version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: xiaoshennong-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - YUNWU_API_KEY=${YUNWU_API_KEY:-}
      - YUNWU_API_BASE=${YUNWU_API_BASE:-https://yunwu.ai/v1}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - KIMI_API_BASE=${KIMI_API_BASE:-https://api.moonshot.cn/v1}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - PORT=5001
      - FLASK_DEBUG=false
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - xiaoshennong-network
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  nginx:
    image: nginx:alpine
    container_name: xiaoshennong-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/xiaoshennong.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - xiaoshennong-network

networks:
  xiaoshennong-network:
    driver: bridge

volumes:
  data:
  logs:

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小神农中医AI · 平台后台</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23a53232'/%3E%3Crect x='6' y='6' width='52' height='52' rx='8' fill='none' stroke='%23fffdf8' stroke-opacity='0.45' stroke-width='2'/%3E%3Ctext x='32' y='42' font-family='serif' font-size='24' font-weight='bold' fill='%23fffdf8' text-anchor='middle'%3E%E7%A5%9E%E5%86%9C%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="assets/xsn-theme.css">
    <script src="assets/xsn-motion.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --paper: #f7f3e9;
            --paper-dark: #efe8d8;
            --ink: #2b2b2b;
            --ink-light: #5a5a5a;
            --cinnabar: #a53232;
            --cinnabar-light: #c45c48;
            --jade: #4a7c59;
            --jade-dark: #2d4a35;
            --gold: #b8860b;
            --gold-light: #d4a84b;
            --border: #d4c4b0;
            --shadow: rgba(43, 27, 18, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', 'STSong', serif;
            background: var(--paper);
            color: var(--ink);
            line-height: 1.7;
            min-height: 100vh;
        }

        /* 宣纸纹理背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(180, 160, 130, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(160, 140, 110, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* 登录页 */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(180deg, #fffdf8 0%, var(--paper) 100%);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 48px 40px;
            box-shadow: 0 12px 40px var(--shadow);
            position: relative;
        }

        .login-card::before,
        .login-card::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            border: 2px solid var(--cinnabar);
        }

        .login-card::before {
            top: 12px;
            left: 12px;
            border-right: none;
            border-bottom: none;
        }

        .login-card::after {
            bottom: 12px;
            right: 12px;
            border-left: none;
            border-top: none;
        }

        .login-title {
            text-align: center;
            margin-bottom: 8px;
        }

        .login-title h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 6px;
            color: var(--cinnabar);
        }

        .login-title p {
            font-size: 14px;
            color: var(--ink-light);
            letter-spacing: 2px;
            margin-top: 8px;
        }

        .login-form {
            margin-top: 36px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--ink-light);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 2px;
            background: #fffdf8;
            font-family: inherit;
            font-size: 15px;
            color: var(--ink);
            transition: all 0.25s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--cinnabar-light);
            box-shadow: 0 0 0 3px rgba(165, 50, 50, 0.08);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 11px 24px;
            border: none;
            border-radius: 2px;
            font-family: inherit;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--cinnabar) 0%, #8a2525 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(165, 50, 50, 0.25);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--cinnabar-light) 0%, var(--cinnabar) 100%);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--paper-dark);
            color: var(--ink);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #e8e0d0;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 13px;
        }

        .login-btn {
            width: 100%;
            margin-top: 10px;
        }

        .error-msg {
            color: var(--cinnabar);
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            min-height: 20px;
        }

        .seal {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            background: var(--cinnabar);
            color: white;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            box-shadow: 0 4px 12px rgba(165, 50, 50, 0.3);
        }

        /* 应用布局 */
        .app-shell {
            display: none;
            min-height: 100vh;
        }

        .app-shell.active {
            display: flex;
        }

        /* 侧边栏 */
        .sidebar {
            width: 230px;
            background: linear-gradient(180deg, #2b2b2b 0%, #1f1f1f 100%);
            color: #e8dcc8;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.2);
        }

        .sidebar-header {
            padding: 28px 20px;
            border-bottom: 1px solid rgba(212, 196, 176, 0.15);
            text-align: center;
        }

        .sidebar-header h2 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--gold-light);
        }

        .sidebar-header p {
            font-size: 11px;
            color: rgba(232, 220, 200, 0.6);
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .nav-menu {
            flex: 1;
            padding: 16px 0;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 22px;
            cursor: pointer;
            transition: all 300ms var(--ease-spring);
            border-left: 3px solid transparent;
            font-size: 14px;
        }

        .nav-item:hover {
            background: rgba(212, 196, 176, 0.08);
            color: #fff;
        }

        .nav-item.active {
            background: rgba(165, 50, 50, 0.15);
            border-left-color: var(--cinnabar);
            color: var(--gold-light);
        }

        .nav-icon {
            width: 22px;
            text-align: center;
            font-size: 16px;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid rgba(212, 196, 176, 0.15);
            font-size: 11px;
            color: rgba(232, 220, 200, 0.5);
            text-align: center;
        }

        /* 主内容区 */
        .main-wrap {
            flex: 1;
            margin-left: 230px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .top-header {
            background: #fffdf8;
            border-bottom: 1px solid var(--border);
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .breadcrumb {
            font-size: 15px;
            color: var(--ink-light);
        }

        .breadcrumb strong {
            color: var(--ink);
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: #f7f3e9;
            color: var(--jade);
        }

        .status-pill::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--jade);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--ink-light);
            padding: 6px 14px;
            border-radius: 2px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            border-color: var(--cinnabar);
            color: var(--cinnabar);
        }

        .main-content {
            flex: 1;
            padding: 28px;
        }

        /* 页面标题 */
        .page-title {
            margin-bottom: 24px;
        }

        .page-title h2 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            display: inline-block;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--cinnabar);
        }

        .page-title p {
            font-size: 13px;
            color: var(--ink-light);
            margin-top: 8px;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: #fffdf8;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 22px;
            position: relative;
            overflow: hidden;
            transition: all 0.25s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--jade);
        }

        .stat-card.cinnabar::before { background: var(--cinnabar); }
        .stat-card.gold::before { background: var(--gold); }
        .stat-card.jade::before { background: var(--jade); }

        .stat-label {
            font-size: 13px;
            color: var(--ink-light);
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 1px;
        }

        .stat-desc {
            font-size: 12px;
            color: var(--ink-light);
            margin-top: 6px;
        }

        /* 内容卡片 */
        .card {
            background: #fffdf8;
            border: 1px solid var(--border);
            border-radius: 4px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            margin-bottom: 24px;
        }

        .card-header {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--cinnabar);
            border-radius: 2px;
        }

        .card-body {
            padding: 22px;
        }

        /* 表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .data-table th,
        .data-table td {
            padding: 13px 16px;
            text-align: left;
            border-bottom: 1px solid #ebe4d6;
        }

        .data-table th {
            background: #f5efe3;
            font-weight: 600;
            color: var(--ink);
            font-size: 13px;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .data-table tbody tr:hover {
            background: #fdfbf5;
        }

        .data-table td {
            color: var(--ink-light);
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 2px;
            font-size: 12px;
        }

        .badge-jade {
            background: #f7f3e9;
            color: var(--jade);
        }

        .badge-gold {
            background: #fffdf8;
            color: #b8860b;
        }

        .badge-cinnabar {
            background: #fdf2f2;
            color: var(--cinnabar);
        }

        /* 搜索和筛选 */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            min-width: 240px;
            padding: 9px 14px;
            border: 1px solid var(--border);
            border-radius: 2px;
            background: #fffdf8;
            font-family: inherit;
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--cinnabar-light);
        }

        .filter-select {
            padding: 9px 14px;
            border: 1px solid var(--border);
            border-radius: 2px;
            background: #fffdf8;
            font-family: inherit;
            font-size: 14px;
            min-width: 140px;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
        }

        .page-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            background: #fffdf8;
            color: var(--ink);
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--cinnabar);
            color: var(--cinnabar);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-btn.active {
            background: var(--cinnabar);
            border-color: var(--cinnabar);
            color: white;
        }

        /* 日志 */
        .log-viewer {
            background: #1e1e1e;
            color: #d4c4b0;
            border-radius: 4px;
            padding: 18px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            line-height: 1.8;
            max-height: 600px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-line {
            border-bottom: 1px solid rgba(212, 196, 176, 0.08);
            padding: 2px 0;
        }

        /* 详情弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(43, 27, 18, 0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #fffdf8;
            border: 1px solid var(--border);
            border-radius: 4px;
            width: 100%;
            max-width: 640px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        }

        .modal-header {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            font-size: 18px;
            letter-spacing: 1px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--ink-light);
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--cinnabar);
        }

        .modal-body {
            padding: 22px;
        }

        .detail-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px dashed #ebe4d6;
        }

        .detail-label {
            width: 100px;
            flex-shrink: 0;
            color: var(--ink-light);
            font-size: 13px;
        }

        .detail-value {
            flex: 1;
            color: var(--ink);
            font-size: 14px;
        }

        /* 加载和空状态 */
        .loading {
            text-align: center;
            padding: 50px;
            color: var(--ink-light);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--ink-light);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        /* 隐藏 */
        .hidden {
            display: none !important;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-wrap {
                margin-left: 0;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        /* P3 设计系统接入 */
        button:active { transform: scale(0.97); transition-duration: 100ms; }
        .btn:active { transform: scale(0.97); }
        .nav-item:active { transform: scale(0.98); transition-duration: 100ms; }
        @keyframes xsnSectionIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .xsn-section-in { animation: xsnSectionIn 200ms var(--ease-spring, ease-out); }

        /* P4 管理视图 */
        .xsn-btn-sm { padding: 5px 12px; font-size: 12px; }
        .stat-gold-text { color: var(--gold); }
        .stat-hint { color: var(--gold); font-size: 12px; }
        .stat-card.clickable { cursor: pointer; }
        .action-cell { white-space: nowrap; }
        .action-cell .xsn-btn { margin-right: 6px; }
        .toolbar-right { margin-left: auto; }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card" data-reveal>
            <div class="seal">神农</div>
            <div class="login-title">
                <h1>小神农</h1>
                <p>后台管理系统 · 中医 AI 知识库</p>
            </div>
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label>管理令牌</label>
                    <input type="password" class="form-control" id="adminToken" placeholder="请输入后台管理令牌" required>
                </div>
                <button type="submit" class="btn btn-primary login-btn">登 录</button>
                <div class="error-msg" id="loginError"></div>
                <p style="text-align: center; font-size: 12px; color: var(--ink-light); margin-top: 16px;">默认令牌：xiaoshennong-admin</p>
            </form>
        </div>
    </div>

    <!-- 应用主界面 -->
    <div class="app-shell" id="appShell">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>小神农</h2>
                <p>后台管理系统</p>
            </div>
            <nav class="nav-menu" id="navMenu">
                <div class="nav-item active" data-view="dashboard">
                    <span class="nav-icon">◈</span>
                    <span>总览 dashboard</span>
                </div>
                <div class="nav-item" data-view="symptoms">
                    <span class="nav-icon">症</span>
                    <span>症状管理</span>
                </div>
                <div class="nav-item" data-view="syndromes">
                    <span class="nav-icon">证</span>
                    <span>证型管理</span>
                </div>
                <div class="nav-item" data-view="formulas">
                    <span class="nav-icon">方</span>
                    <span>方剂管理</span>
                </div>
                <div class="nav-item" data-view="drugs">
                    <span class="nav-icon">药</span>
                    <span>药物管理</span>
                </div>
                <div class="nav-item" data-view="sessions">
                    <span class="nav-icon">话</span>
                    <span>会话管理</span>
                </div>
                <div class="nav-item" data-view="clinics">
                    <span class="nav-icon">馆</span>
                    <span>医馆核验</span>
                </div>
                <div class="nav-item" data-view="users">
                    <span class="nav-icon">众</span>
                    <span>用户管理</span>
                </div>
                <div class="nav-item" data-view="orders">
                    <span class="nav-icon">单</span>
                    <span>订单总览</span>
                </div>
                <div class="nav-item" data-view="logs">
                    <span class="nav-icon">志</span>
                    <span>系统日志</span>
                </div>
                <div class="nav-item" data-view="system">
                    <span class="nav-icon">系</span>
                    <span>系统信息</span>
                </div>
            </nav>
            <div class="sidebar-footer">
                小神农中医 AI · v5.0
            </div>
        </aside>

        <div class="main-wrap">
            <header class="top-header">
                <div class="breadcrumb" id="breadcrumb">
                    <strong>总览</strong>
                </div>
                <div class="header-actions">
                    <span class="status-pill" id="apiStatus">API 连接中</span>
                    <button class="logout-btn" id="logoutBtn">退出</button>
                </div>
            </header>

            <main class="main-content" id="mainContent">
                <!-- 动态内容 -->
            </main>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">详情</h3>

    <script>
        // API 基础配置
        // 本地开发时前端跑在 8080 / file://，API 跑在 5001；生产环境由 nginx 同源代理
        const DEFAULT_API_BASE = 'http://localhost:5001';

        function isValidApiBase(v) {
            return v && (v.startsWith('http://') || v.startsWith('https://'));
        }

        function detectApiBase() {
            const manual = localStorage.getItem('xsn_api_base');
            if (isValidApiBase(manual)) return manual;
            if (manual !== null && !isValidApiBase(manual)) {
                localStorage.removeItem('xsn_api_base');
            }
            if (location.protocol === 'file:') return DEFAULT_API_BASE;
            if ((location.hostname === 'localhost' || location.hostname === '127.0.0.1') && location.port !== '5001') {
                return DEFAULT_API_BASE;
            }
            return '';  // 空字符串表示同源，走 nginx 代理
        }

        let API_BASE = detectApiBase();
        console.log('[XiaoShennong Admin] API_BASE:', API_BASE || '(relative)');
        let adminToken = localStorage.getItem('xsn_admin_token') || '';
        let currentView = 'dashboard';

        // 视图状态缓存
        const viewState = {
            symptoms: { page: 1, keyword: '', body_part: '', category: '' },
            syndromes: { page: 1, keyword: '', system: '' },
            formulas: { page: 1, keyword: '' },
            drugs: { page: 1, keyword: '', category: '' },
            sessions: { page: 1 },
            clinics: { status: '' },
            users: { page: 1 },
            orders: { page: 1, status: '', order_type: '' }
        };

        // API 请求封装
        async function apiRequest(method, path, body = null) {
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'X-Admin-Token': adminToken
                }
            };
            if (body) options.body = JSON.stringify(body);

            const base = isValidApiBase(API_BASE) ? API_BASE : DEFAULT_API_BASE;
            try {
                const res = await fetch(`${base}${path}`, options);
                const data = await res.json();
                return { ok: res.ok, status: res.status, data };
            } catch (err) {
                return { ok: false, status: 0, data: { success: false, error: err.message } };
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            if (adminToken) {
                validateToken();
            }

            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('logoutBtn').addEventListener('click', handleLogout);
            document.getElementById('modalClose').addEventListener('click', closeModal);
            document.getElementById('detailModal').addEventListener('click', (e) => {
                if (e.target.id === 'detailModal') closeModal();
            });

            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    const view = item.dataset.view;
                    switchView(view);
                });
            });
        });

        async function validateToken() {
            const res = await apiRequest('POST', '/api/admin/auth', { token: adminToken });
            if (res.ok && res.data.success) {
                showApp();
                checkApiHealth();
            } else {
                adminToken = '';
                localStorage.removeItem('xsn_admin_token');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const token = document.getElementById('adminToken').value.trim();
            const errorEl = document.getElementById('loginError');

            const res = await apiRequest('POST', '/api/admin/auth', { token });
            if (res.ok && res.data.success) {
                adminToken = token;
                localStorage.setItem('xsn_admin_token', token);
                errorEl.textContent = '';
                showApp();
                checkApiHealth();
            } else {
                errorEl.textContent = res.data.error || '登录失败，请检查管理令牌';
            }
        }

        function handleLogout() {
            adminToken = '';
            localStorage.removeItem('xsn_admin_token');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('appShell').classList.remove('active');
        }

        function showApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appShell').classList.add('active');
            switchView('dashboard');
        }

        async function checkApiHealth() {
            const statusEl = document.getElementById('apiStatus');
            const base = isValidApiBase(API_BASE) ? API_BASE : DEFAULT_API_BASE;
            try {
                const res = await fetch(`${base}/api/health`);
                if (res.ok) {
                    statusEl.textContent = 'API 已连接';
                    statusEl.style.background = '#f7f3e9';
                    statusEl.style.color = '#4a7c59';
                } else {
                    throw new Error('API 异常');
                }
            } catch (err) {
                statusEl.textContent = 'API 未连接';
                statusEl.style.background = '#fdf2f2';
                statusEl.style.color = '#a53232';
            }
        }

        function switchView(view) {
            currentView = view;

            // 更新导航
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.view === view);
            });

            // 更新面包屑
            const titles = {
                dashboard: '总览',
                symptoms: '症状管理',
                syndromes: '证型管理',
                formulas: '方剂管理',
                drugs: '药物管理',
                sessions: '会话管理',
                clinics: '医馆核验',
                users: '用户管理',
                orders: '订单总览',
                logs: '系统日志',
                system: '系统信息'
            };
            document.getElementById('breadcrumb').innerHTML = `<strong>${titles[view]}</strong>`;

            // 渲染视图
            const main = document.getElementById('mainContent');
            main.innerHTML = '<div class="loading">加载中...</div>';

            main.classList.remove('xsn-section-in');
            void main.offsetWidth;
            main.classList.add('xsn-section-in');

            switch (view) {
                case 'dashboard': renderDashboard(); break;
                case 'symptoms': renderSymptoms(); break;
                case 'syndromes': renderSyndromes(); break;
                case 'formulas': renderFormulas(); break;
                case 'drugs': renderDrugs(); break;
                case 'sessions': renderSessions(); break;
                case 'clinics': renderClinics(); break;
                case 'users': renderUsers(); break;
                case 'orders': renderOrders(); break;
                case 'logs': renderLogs(); break;
                case 'system': renderSystem(); break;
            }
        }

                    <div class="stat-card jade">

                    </div>
                    <div class="stat-card gold">

                    </div>
                    <div class="stat-card">

                        <div class="stat-value">${s.drugs.total}</div>

                    </div>
                    <div class="stat-card cinnabar">
                        <div class="stat-label">古籍文档</div>
                        <div class="stat-value">${s.knowledge.total_documents || 0}</div>
                        <div class="stat-desc">RAG 向量库中文古籍条文</div>

                </div>

                <div class="card">
                    <div class="card-header">
                        <div class="card-title">知识库状态</div>
                    </div>
                    <div class="card-body">
                        <table class="data-table">
                            <tbody>
                                <tr><td style="width:160px">嵌入模型</td><td>${s.knowledge.embedding_model || '-'}</td></tr>
                                <tr><td>计算设备</td><td>${s.knowledge.device || '-'}</td></tr>
                                <tr><td>症状编码数</td><td>${s.knowledge.symptom_count || 0}</td></tr>
                                <tr><td>证型编码数</td><td>${s.knowledge.formula_count || 0}</td></tr>
                                <tr><td>药物编码数</td><td>${s.knowledge.drug_count || 0}</td></tr>

        // ========== 通用表格渲染 ==========
        function renderTableView(title, subtitle, toolbarHtml, columns, rows, pagination, onRowClick = null) {
            let html = `
                <div class="page-title">
                    <h2>${title}</h2>
                    <p>${subtitle}</p>
                </div>
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">数据列表</div>
                    </div>
                    <div class="card-body">
                        ${toolbarHtml}
                        <div style="overflow-x:auto">
                            <table class="data-table">
                                <thead><tr>${columns.map(c => `<th>${c}</th>`).join('')}</tr></thead>
                                <tbody>
            `;

            if (rows.length === 0) {
                html += `<tr><td colspan="${columns.length}" style="text-align:center;padding:40px;color:#999">暂无数据</td></tr>`;
            } else {
                rows.forEach(row => {
                    const clickAttr = onRowClick ? `onclick="${onRowClick}('${row.id}')" style="cursor:pointer"` : '';
                    html += `<tr ${clickAttr}>${row.cells.map(cell => `<td>${cell}</td>`).join('')}</tr>`;
                });
            }

            html += `</tbody></table></div>${pagination}</div></div>`;
            return html;
        }

        function renderPagination(view, total, page, pageSize) {
            const totalPages = Math.max(1, Math.ceil(total / pageSize));
            let html = '<div class="pagination">';
            html += `<button class="page-btn" onclick="changePage('${view}', ${page - 1})" ${page <= 1 ? 'disabled' : ''}>上一页</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= page - 1 && i <= page + 1)) {
                    html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="changePage('${view}', ${i})">${i}</button>`;
                } else if (i === page - 2 || i === page + 2) {
                    html += `<span style="color:#999">...</span>`;
                }
            }
            html += `<button class="page-btn" onclick="changePage('${view}', ${page + 1})" ${page >= totalPages ? 'disabled' : ''}>下一页</button>`;
            html += `<span style="margin-left:12px;color:#999;font-size:13px">共 ${total} 条</span>`;
            html += '</div>';
            return html;
        }

        function changePage(view, page) {
            viewState[view].page = page;
            switch (view) {
                case 'symptoms': renderSymptoms(); break;
                case 'syndromes': renderSyndromes(); break;
                case 'formulas': renderFormulas(); break;
                case 'drugs': renderDrugs(); break;
                case 'sessions': renderSessions(); break;
                case 'users': renderUsers(); break;
                case 'orders': renderOrders(); break;
            }
        }

                keyword: st.keyword,
                body_part: st.body_part,
                category: st.category
            });
            const res = await apiRequest('GET', `/api/admin/symptoms?${params}`);
            const main = document.getElementById('mainContent');

            if (!res.ok || !res.data.success) {
                main.innerHTML = `<div class="empty-state">加载失败：${res.data.error || '未知错误'}</div>`;
                return;
            }

            const data = res.data.data;
            window._symptomsCache = data.items;
            const filters = data.filters;

            const toolbar = `
                <div class="toolbar">
                    <input type="text" class="search-input" placeholder="搜索症状名称或别名..." value="${st.keyword}" onchange="updateFilter('symptoms', 'keyword', this.value)">
                    <select class="filter-select" onchange="updateFilter('symptoms', 'body_part', this.value)">
                        <option value="">全部部位</option>
                        ${filters.body_parts.map(f => `<option value="${f.code}" ${st.body_part === f.code ? 'selected' : ''}>${f.name}</option>`).join('')}
                    </select>
                    <select class="filter-select" onchange="updateFilter('symptoms', 'category', this.value)">
                        <option value="">全部类别</option>
                        ${filters.categories.map(f => `<option value="${f.code}" ${st.category === f.code ? 'selected' : ''}>${f.name}</option>`).join('')}
                    </select>
                    <button class="btn btn-secondary btn-sm" onclick="resetFilters('symptoms')">重置</button>
                </div>
            `;

            const rows = data.items.map(item => ({
                id: item.id,
                cells: [
                    `<code>${item.id}</code>`,
                    `<strong>${item.name}</strong>`,
                    item.aliases.slice(0, 4).join('、') || '-',

            const main = document.getElementById('mainContent');

            if (!res.ok || !res.data.success) {
                main.innerHTML = `<div class="empty-state">加载失败：${res.data.error || '未知错误'}</div>`;
                return;
            }

            const data = res.data.data;
            const toolbar = `
                <div class="toolbar">
                    <span style="color:#999;font-size:13px">显示最近的对话问诊会话</span>
                </div>
            `;

            const rows = data.items.map(item => ({
                id: item.session_id,
                cells: [
                    `<code>${item.session_id}</code>`,
                    `<span class="badge badge-jade">${item.phase}</span>`,
                    item.turn_count,
                    item.symptom_count,
                    item.diagnosis_triggered ? '<span class="badge badge-cinnabar">已触发</span>' : '<span class="badge badge-gold">收集中</span>',
                    formatTime(item.last_activity),
                    `<button class="btn btn-secondary btn-sm" onclick="showSessionDetail('${item.session_id}')">查看</button>`
                ]
            }));

            main.innerHTML = renderTableView(
                '会话管理',
                '查看用户对话式问诊会话状态与收集进度',
                toolbar,
                ['会话 ID', '阶段', '轮次', '症状数', '辨证状态', '最后活跃', '操作'],
                rows,
                renderPagination('sessions', data.total, data.page, data.page_size)
            );
        }

        async function showSessionDetail(sessionId) {
            const res = await apiRequest('GET', `/api/admin/sessions/${sessionId}`);
            if (!res.ok || !res.data.success) {
                alert('加载会话详情失败：' + (res.data.error || '未知错误'));
                return;
            }
            const s = res.data.data;
            openModal('会话详情', `
                <div class="detail-row"><div class="detail-label">会话 ID</div><div class="detail-value">${s.session_id}</div></div>
                <div class="detail-row"><div class="detail-label">当前阶段</div><div class="detail-value">${s.phase}</div></div>
                <div class="detail-row"><div class="detail-label">轮次</div><div class="detail-value">${s.turn_count}</div></div>
                <div class="detail-row"><div class="detail-label">已收集症状</div><div class="detail-value">${(s.collected_symptoms || []).map(x => x.name).join('、') || '-'}</div></div>
                <div class="detail-row"><div class="detail-label">用户画像</div><div class="detail-value">${JSON.stringify(s.user_profile || {})}</div></div>
                <div class="detail-row"><div class="detail-label">是否可辨证</div><div class="detail-value">${s.is_ready_for_diagnosis ? '是' : '否'}</div></div>
            `);
        }

        // ========== 医馆核验 ==========
        const CLINIC_STATUS_MAP = {
            pending: ['xsn-status-pending', '待核验'],
            verified: ['xsn-status-ok', '已核验'],
            frozen: ['xsn-status-bad', '已冻结']
        };

        async function renderClinics() {
            const res = await apiRequest('GET', '/api/admin/clinics');
            const main = document.getElementById('mainContent');

            if (!res.ok || !res.data.success) {
                main.innerHTML = `<div class="empty-state">加载失败：${res.data.error || '未知错误'}</div>`;
                return;
            }

            window._clinicsCache = res.data.data.clinics || [];
            const st = viewState.clinics;
            main.innerHTML = `
                <div class="page-title">
                    <h2>医馆核验</h2>
                    <p>审核医馆入驻资质，可冻结或恢复医馆服务状态</p>
                </div>
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">医馆列表</div>
                    </div>
                    <div class="card-body">
                        <div class="toolbar">
                            <select class="filter-select toolbar-right" onchange="setClinicFilter(this.value)">
                                <option value="" ${st.status === '' ? 'selected' : ''}>全部状态</option>
                                <option value="pending" ${st.status === 'pending' ? 'selected' : ''}>待核验</option>
                                <option value="verified" ${st.status === 'verified' ? 'selected' : ''}>已核验</option>
                                <option value="frozen" ${st.status === 'frozen' ? 'selected' : ''}>已冻结</option>
                            </select>
                        </div>
                        <div style="overflow-x:auto">
                            <table class="data-table">
                                <thead><tr><th>编号</th><th>名称</th><th>许可证号</th><th>地址</th><th>代煎</th><th>状态</th><th>申请时间</th><th>操作</th></tr></thead>
                                <tbody id="clinicTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            renderClinicTableBody();
        }

        function setClinicFilter(status) {
            viewState.clinics.status = status;
            renderClinicTableBody();
        }

        function renderClinicTableBody() {
            const tbody = document.getElementById('clinicTableBody');
            if (!tbody) return;
            const st = viewState.clinics;
            const list = (window._clinicsCache || []).filter(c => !st.status || c.status === st.status);

            if (list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:#999">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = list.map(c => {
                const [badgeCls, statusText] = CLINIC_STATUS_MAP[c.status] || ['xsn-status-pending', c.status || '未知'];
                const decoction = c.support_decoction ? `支持（${fenToYuan(c.decoction_fee)}）` : '不支持';
                let actions = `<button class="xsn-btn xsn-btn-outline-jade xsn-btn-sm" onclick="showClinicVerifications('${c.clinic_id}')">核验记录</button>`;
                if (c.status === 'pending') {
                    actions += `<button class="xsn-btn xsn-btn-jade xsn-btn-sm" onclick="clinicAction('${c.clinic_id}', 'verified', '通过核验')">通过核验</button>`;
                    actions += `<button class="xsn-btn xsn-btn-outline-cinnabar xsn-btn-sm" onclick="clinicAction('${c.clinic_id}', 'frozen', '冻结')">冻结</button>`;
                } else if (c.status === 'verified') {
                    actions += `<button class="xsn-btn xsn-btn-outline-cinnabar xsn-btn-sm" onclick="clinicAction('${c.clinic_id}', 'frozen', '冻结')">冻结</button>`;
                } else if (c.status === 'frozen') {
                    actions += `<button class="xsn-btn xsn-btn-jade xsn-btn-sm" onclick="clinicAction('${c.clinic_id}', 'verified', '恢复核验')">恢复核验</button>`;
                }
                return `<tr>
                    <td><code>${c.clinic_id}</code></td>
                    <td><strong>${c.name}</strong></td>
                    <td>${c.license_no || '-'}</td>
                    <td>${c.address || '-'}</td>
                    <td>${decoction}</td>
                    <td><span class="xsn-status ${badgeCls}">${statusText}</span></td>
                    <td>${fmtMinute(c.created_at)}</td>
                    <td class="action-cell">${actions}</td>
                </tr>`;
            }).join('');
        }

        async function clinicAction(clinicId, action, label) {
            if (!confirm(`确认对医馆 ${clinicId} 执行「${label}」操作？`)) return;
            const note = prompt(`${label}备注（可留空）`, '');
            if (note === null) return;

            const res = await apiRequest('POST', `/api/admin/clinics/${clinicId}/verify`, { action, note });
            if (res.ok && res.data.success) {
                renderClinics();
            } else {
                alert('操作失败：' + (res.data.error || '未知错误'));
            }
        }

        async function showClinicVerifications(clinicId) {
            const res = await apiRequest('GET', `/api/admin/clinics/${clinicId}/verifications`);
            if (!res.ok || !res.data.success) {
                alert('加载核验记录失败：' + (res.data.error || '未知错误'));
                return;
            }
            const list = res.data.data.list || [];
            const rows = list.length === 0
                ? '<tr><td colspan="5" style="text-align:center;padding:30px;color:#999">暂无数据</td></tr>'
                : list.map(v => `<tr>
                    <td><code>${v.cv_id}</code></td>
                    <td><span class="xsn-status ${v.action === 'verified' ? 'xsn-status-ok' : 'xsn-status-bad'}">${v.action === 'verified' ? '核验通过' : '冻结'}</span></td>
                    <td>${v.reviewer || '-'}</td>
                    <td>${v.note || '-'}</td>
                    <td>${fmtMinute(v.created_at)}</td>
                </tr>`).join('');
            openModal(`核验记录 · ${clinicId}`, `
                <table class="data-table">
                    <thead><tr><th>记录编号</th><th>动作</th><th>操作人</th><th>备注</th><th>时间</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            `);
        }

        // ========== 用户管理 ==========
        async function renderUsers() {
            const st = viewState.users;
            const params = new URLSearchParams({ page: st.page, size: 20 });
            const res = await apiRequest('GET', `/api/admin/users?${params}`);
            const main = document.getElementById('mainContent');

            if (!res.ok || !res.data.success) {
                main.innerHTML = `<div class="empty-state">加载失败：${res.data.error || '未知错误'}</div>`;
                return;
            }

            const data = res.data.data;
            const users = data.users || [];
            const rowsHtml = users.length === 0
                ? '<tr><td colspan="8" style="text-align:center;padding:40px;color:#999">暂无数据</td></tr>'
                : users.map(u => `<tr>
                    <td><code>${u.user_id}</code></td>
                    <td>${u.phone || '-'}</td>
                    <td><strong>${u.nickname || '未设置'}</strong></td>
                    <td>${u.gender || '-'}</td>
                    <td>${u.birth_year || '-'}</td>
                    <td>${u.emr_count || 0}</td>
                    <td>${u.order_count || 0}</td>
                    <td>${fmtMinute(u.created_at)}</td>
                </tr>`).join('');

            main.innerHTML = `
                <div class="page-title">
                    <h2>用户管理</h2>
                    <p>查看平台注册用户及其病历、订单概况（手机号已脱敏）</p>
                </div>
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">用户列表</div>
                    </div>
                    <div class="card-body">
                        <div style="overflow-x:auto">
                            <table class="data-table">
                                <thead><tr><th>用户编号</th><th>手机号</th><th>昵称</th><th>性别</th><th>出生年</th><th>病历数</th><th>订单数</th><th>注册时间</th></tr></thead>
                                <tbody>${rowsHtml}</tbody>
                            </table>
                        </div>
                        ${renderPagination('users', data.total || 0, st.page, 20)}
                    </div>
                </div>
            `;
        }

        // ========== 订单总览 ==========
        const ORDER_STATUS_MAP = {
            created: '待接单',
            accepted: '已接单',
            preparing: '配药中',
            decocting: '代煎中',
            shipped: '已发货',
            awaiting_pickup: '待取货',
            completed: '已完成',
            cancelled: '已取消'
        };

        async function renderOrders() {
            const st = viewState.orders;
            const params = new URLSearchParams({
                status: st.status,
                order_type: st.order_type,
                page: st.page,
                size: 20
            });
            const res = await apiRequest('GET', `/api/admin/orders?${params}`);
            const main = document.getElementById('mainContent');

            if (!res.ok || !res.data.success) {
                main.innerHTML = `<div class="empty-state">加载失败：${res.data.error || '未知错误'}</div>`;
                return;
            }

            const data = res.data.data;
            const orders = data.orders || [];
            const typeBadge = t => t === 'prescription'
                ? '<span class="xsn-status xsn-status-bad">处方</span>'
                : '<span class="xsn-status xsn-status-ok">商城</span>';

            const toolbar = `
                <div class="toolbar">
                    <select class="filter-select" onchange="updateFilter('orders', 'order_type', this.value)">
                        <option value="" ${st.order_type === '' ? 'selected' : ''}>全部类型</option>
                        <option value="prescription" ${st.order_type === 'prescription' ? 'selected' : ''}>处方</option>
                        <option value="mall" ${st.order_type === 'mall' ? 'selected' : ''}>商城</option>
                    </select>
                    <select class="filter-select" onchange="updateFilter('orders', 'status', this.value)">
                        <option value="" ${st.status === '' ? 'selected' : ''}>全部状态</option>
                        ${Object.keys(ORDER_STATUS_MAP).map(k => `<option value="${k}" ${st.status === k ? 'selected' : ''}>${ORDER_STATUS_MAP[k]}</option>`).join('')}
                    </select>
                </div>
            `;

            const rowsHtml = orders.length === 0
                ? '<tr><td colspan="9" style="text-align:center;padding:40px;color:#999">暂无数据</td></tr>'
                : orders.map(o => `<tr>
                    <td><code>${o.order_id}</code></td>
                    <td>${typeBadge(o.order_type)}</td>
                    <td><code>${o.user_id}</code></td>
                    <td>${o.clinic_name || '-'}</td>
                    <td>${o.fulfillment === 'delivery' ? '邮寄' : o.fulfillment === 'pickup' ? '自取' : (o.fulfillment || '-')}</td>
                    <td>${o.decoction ? '代煎' : '-'}</td>
                    <td>${fenToYuan(o.amount)}</td>
                    <td>${ORDER_STATUS_MAP[o.status] || o.status || '-'}</td>
                    <td>${fmtMinute(o.created_at)}</td>
                </tr>`).join('');

            main.innerHTML = `
                <div class="page-title">
                    <h2>订单总览</h2>
                    <p>查看处方流转与商城订单，支持按类型与状态筛选</p>
                </div>
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">订单列表</div>
                    </div>
                    <div class="card-body">
                        ${toolbar}
                        <div style="overflow-x:auto">
                            <table class="data-table">
                                <thead><tr><th>订单号</th><th>类型</th><th>用户</th><th>医馆</th><th>履约</th><th>代煎</th><th>金额</th><th>状态</th><th>时间</th></tr></thead>
                                <tbody>${rowsHtml}</tbody>
                            </table>
                        </div>
                        ${renderPagination('orders', data.total || 0, st.page, 20)}
                    </div>
                </div>
            `;
        }

        // ========== 系统日志 ==========
        async function renderLogs() {
            const res = await apiRequest('GET', '/api/admin/logs?lines=200');
            const main = document.getElementById('mainContent');

            if (!res.ok || !res.data.success) {
                main.innerHTML = `<div class="empty-state">加载失败：${res.data.error || '未知错误'}</div>`;
                return;
            }

            const data = res.data.data;
            const lines = data.lines.map(line => `<div class="log-line">${escapeHtml(line)}</div>`).join('') || '<div class="empty-state">暂无日志</div>';

            main.innerHTML = `
                <div class="page-title">
                    <h2>系统日志</h2>
                    <p>查看后端服务运行日志，便于排查问题</p>
                </div>
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">${data.file}</div>
                        <button class="btn btn-secondary btn-sm" onclick="renderLogs()">刷新</button>
                    </div>
                    <div class="card-body">
                        <div class="log-viewer">${lines}</div>
                    </div>
                </div>
            `;
        }

        // ========== 系统信息 ==========
        async function renderSystem() {
            const res = await apiRequest('GET', '/api/admin/system');
            const main = document.getElementById('mainContent');

            if (!res.ok || !res.data.success) {
                main.innerHTML = `<div class="empty-state">加载失败：${res.data.error || '未知错误'}</div>`;
                return;
            }

            const s = res.data.data;
            main.innerHTML = `
                <div class="page-title">
                    <h2>系统信息</h2>
                    <p>运行环境与配置状态</p>
                </div>
                <div class="card">
                    <div class="card-header"><div class="card-title">环境配置</div></div>
                    <div class="card-body">
                        <table class="data-table">
                            <tbody>
                                <tr><td style="width:180px">Python 版本</td><td>${s.python_version}</td></tr>
                                <tr><td>操作系统</td><td>${s.platform}</td></tr>
                                <tr><td>LLM 提供商</td><td><span class="badge badge-jade">${s.llm_provider}</span></td></tr>
                                <tr><td>数据目录</td><td><code>${s.data_dir}</code></td></tr>
                                <tr><td>管理令牌</td><td>${s.admin_token_configured ? '<span class="badge badge-jade">已自定义</span>' : '<span class="badge badge-cinnabar">使用默认令牌（生产环境请修改）</span>'}</td></tr>
                                <tr><td>服务器时间</td><td>${s.timestamp}</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><div class="card-title">安全提示</div></div>
                    <div class="card-body" style="color:var(--ink-light);font-size:14px">
                        <p>当前后台使用简单的令牌认证（<code>X-Admin-Token</code>）。</p>
                        <p>生产部署前，请设置环境变量 <code>ADMIN_TOKEN</code> 使用强随机字符串，并考虑接入更完善的身份认证机制。</p>
                    </div>
                </div>
            `;
        }

        // ========== 工具函数 ==========
        function updateFilter(view, key, value) {
            viewState[view][key] = value;
            viewState[view].page = 1;
            switch (view) {
                case 'symptoms': renderSymptoms(); break;
                case 'syndromes': renderSyndromes(); break;
                case 'formulas': renderFormulas(); break;
                case 'drugs': renderDrugs(); break;
                case 'orders': renderOrders(); break;
            }
        }

        function resetFilters(view) {
            viewState[view] = { page: 1, keyword: '', body_part: '', category: '', system: '' };
            switch (view) {
                case 'symptoms': renderSymptoms(); break;
                case 'syndromes': renderSyndromes(); break;
                case 'formulas': renderFormulas(); break;
                case 'drugs': renderDrugs(); break;
            }
        }

        function openModal(title, content) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('detailModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function formatTime(ts) {
            if (!ts) return '-';
            const d = new Date(ts * 1000);
            return d.toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        // ISO 时间字符串截到分钟，如 2026-07-19T15:47:15 -> 2026-07-19 15:47
        function fmtMinute(ts) {
            if (!ts) return '-';
            return String(ts).replace('T', ' ').slice(0, 16);
        }

        // 金额分转元
        function fenToYuan(fen) {
            return '¥' + ((fen || 0) / 100).toFixed(2);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>

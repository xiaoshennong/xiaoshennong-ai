/* 卷轴/卡片的回纹角饰 */
.card, .result-card {
    position: relative;
}
.card::before, .card::after,
.result-card::before, .result-card::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border: 2px solid #a53232;
    pointer-events: none;
}
.card::before, .result-card::before {
    top: 10px;
    left: 10px;
    border-right: none;
    border-bottom: none;
}
.card::after, .result-card::after {
    bottom: 10px;
    right: 10px;
    border-left: none;
    border-top: none;
}


        * { margin: 0; padding: 0; box-sizing: border-box; }

/* 宣纸纹理背景 */

    <script>
        // API配置
        // 本地开发时前端跑在 8080 / file://，API 跑在 5001；生产环境由 nginx 同源代理
        const DEFAULT_API_BASE = 'http://localhost:5001';

        function isValidApiBase(v) {
            return v && (v.startsWith('http://') || v.startsWith('https://'));
        }

        function detectApiBase() {
            const manual = localStorage.getItem('xsn_api_base');
            if (isValidApiBase(manual)) return manual;
            // 如果 localStorage 存的是空字符串或无效值，则清理
            if (manual !== null && !isValidApiBase(manual)) {
                localStorage.removeItem('xsn_api_base');
            }
            if (location.protocol === 'file:') return DEFAULT_API_BASE;
            if ((location.hostname === 'localhost' || location.hostname === '127.0.0.1') && location.port !== '5001') {
                return DEFAULT_API_BASE;
            }
            return '';  // 空字符串表示同源，走 nginx 代理
        }

        let API_BASE = detectApiBase();
        console.log('[XiaoShennong] API_BASE:', API_BASE || '(relative)');
        let isProcessing = false;

        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            checkAPIStatus();
            initChat();
            loadAgentList();
            document.getElementById('chatInput').focus();
        });

        // 检查API状态，支持自动探测端口
        async function checkAPIStatus() {
            const statusEl = document.getElementById('apiStatus');
            statusEl.textContent = 'API连接中...';
            statusEl.className = 'api-status disconnected';
            statusEl.style.cursor = 'default';
            statusEl.onclick = null;

            const candidates = [];
            if (isValidApiBase(API_BASE)) candidates.push(API_BASE);
            candidates.push(DEFAULT_API_BASE);

            for (const base of candidates) {
                try {
                    const resp = await fetch(`${base}/api/health`, { method: 'GET' });
                    if (resp.ok) {
                        const data = await resp.json();

        // 流式诊断 - 实时展示思考过程
        async function streamDiagnosis(text) {
            const container = document.getElementById('chatContainer');
            
            // 创建思考过程消息
            const thinkingId = 'thinking_' + Date.now();
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            
            container.innerHTML += `
                <div class="chat-message thinking-message" id="${thinkingId}">
                    <div class="message-avatar">🧠</div>
                    <div class="message-content">
                        <div class="message-bubble">
                            <div class="thinking-process">
                                <div class="thinking-title">
                                    <span>🧠</span> AI正在分析...
                                </div>
                                <div id="steps_${thinkingId}"></div>
                                <div class="loading-dots" id="loading_${thinkingId}">
                                    <span></span><span></span><span></span>
                                </div>
                            </div>
                        </div>
                        <div class="message-time">${time}</div>
                    </div>
                </div>
            `;
            scrollToBottom();
            
            const stepsContainer = document.getElementById(`steps_${thinkingId}`);
            
            try {
                const base = isValidApiBase(API_BASE) ? API_BASE : DEFAULT_API_BASE;
                const resp = await fetch(`${base}/api/diagnosis/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symptoms: text, query: text })
                });

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                
                let resultData = null;
                let stepCount = 0;
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n\n');
                    
                    for (const line of lines) {
                        if (!line.trim() || !line.startsWith('data: ')) continue;
                        
                        try {
                            const data = JSON.parse(line.substring(6));
                            
                            if (data.type === 'thinking') {
                                // 添加思考步骤 - 兼容后端实际字段（name/description/details）
                                const thought = data.data;
                                stepCount++;

                                // 字段映射：后端用 name/description/details，前端展示用 agent/content/detail
                                const agentName = thought.agent || thought.name || '分析步骤';
                                const contentText = thought.content || thought.description || '';
                                const detailText = thought.detail || (thought.details ? JSON.stringify(thought.details).slice(0, 120) : '');
                                const stepNumber = thought.step || stepCount;
                                const status = thought.status || 'thinking';

                                const statusClass = status === 'completed' ? 'status-completed' :
                                                   status === 'warning' ? 'status-warning' : 'status-thinking';
                                const statusText = status === 'completed' ? '✓' :
                                                  status === 'warning' ? '⚠' : '●';

                                // 创建步骤容器（初始隐藏内容）
                                const stepId = `step_${thinkingId}_${stepCount}`;
                                const stepHtml = `
                                    <div class="thinking-step" id="${stepId}">
                                        <div class="step-number">${stepNumber}</div>
                                        <div class="step-content">
                                            <div class="step-agent">${agentName}</div>
                                            <div class="step-desc" id="${stepId}_content"></div>
                                            <div class="step-desc" style="color: #8b7355; font-size: 11px; margin-top: 2px;" id="${stepId}_detail"></div>
                                        </div>
                                        <span class="step-status ${statusClass}">${statusText}</span>
                                    </div>
                                `;

                                stepsContainer.innerHTML += stepHtml;
                                scrollToBottom();

                                // 延迟显示步骤（渐入效果）
                                setTimeout(() => {
                                    const stepEl = document.getElementById(stepId);
                                    if (stepEl) stepEl.classList.add('visible');
                                }, 100);

                                // 打字机效果显示内容
                                const contentEl = document.getElementById(`${stepId}_content`);
                                const detailEl = document.getElementById(`${stepId}_detail`);
                                if (contentEl && contentText) {
                                    typeWriter(contentEl, contentText, 15);
                                }
                                if (detailEl && detailText) {
                                    setTimeout(() => {
                                        typeWriter(detailEl, detailText, 10);
                                    }, 300);
                                }
                                
                            } else if (data.type === 'result') {
                                resultData = data.data;
                                // 隐藏加载动画
                                const loading = document.getElementById(`loading_${thinkingId}`);
                                if (loading) loading.style.display = 'none';
                                
                                // 添加完成标记
                                const completeId = `complete_${thinkingId}`;
                                stepsContainer.innerHTML += `
                                    <div class="thinking-step" id="${completeId}">
                                        <div class="step-number" style="background: #a53232;">✓</div>
                                        <div class="step-content">
                                            <div class="step-agent">分析完成</div>
                                            <div class="step-desc" id="${completeId}_text"></div>
                                        </div>
                                        <span class="step-status status-completed">完成</span>
                                    </div>
                                `;
                                setTimeout(() => {
                                    const el = document.getElementById(completeId);
                                    if (el) el.classList.add('visible');
                                    const textEl = document.getElementById(`${completeId}_text`);
                                    if (textEl) typeWriter(textEl, '正在生成最终报告...', 20);
                                }, 200);
                                scrollToBottom();
                                
                            } else if (data.type === 'done') {
                                // 流结束，显示结果
                                if (resultData) {
                                    // 淡出思考过程
                                    setTimeout(() => {
                                        const thinkingEl = document.getElementById(thinkingId);
                                        if (thinkingEl) {
                                            thinkingEl.style.opacity = '0.3';
                                            thinkingEl.style.transition = 'opacity 2s';
                                        }
                                    }, 3000);
                                    
                                    // 显示结果（传入完整 resultData，normalizeDiagnosis 会处理 diagnosis 嵌套）
                                    await showDiagnosisResult(resultData);
                                }
                            }
                        } catch (e) {
                            console.error('Parse error:', e, line);
                        }
                    }
                }
            } catch (e) {
                console.error('Stream error:', e);
                throw e; // 触发fallback
            }
        }

        // 统一诊断结果结构（兼容旧版/精简版后端与流式 SSE）
        function normalizeDiagnosis(result) {
            if (!result) result = {};

            // 保留顶层字段（流式结果中 advice/syndrome/constitution 在 diagnosis 之外）
            const topLevel = {
                constitution: result.constitution || '',
                syndrome: result.syndrome || '',
                advice: result.advice || ''
            };

            const diagnosis = result.diagnosis || result;

            const formulas = diagnosis.formulas || (diagnosis.matched_formulas || []).map(name =>
                typeof name === 'string' ? { name, id: '', functions: '', composition: [] } : name
            );

            return {
                symptoms: diagnosis.symptoms || diagnosis.matched_symptoms || [],
                formulas: formulas,
                acupoints: diagnosis.acupoints || [],
                dietary: diagnosis.dietary || [],
                qigong: diagnosis.qigong || [],
                massage: diagnosis.massage || [],
                constitution: topLevel.constitution || diagnosis.constitution || '辨证分析结果',
                syndrome: topLevel.syndrome || diagnosis.syndrome || '',
                advice: topLevel.advice || diagnosis.advice || ''
            };
        }

        // 添加Bot消息（打字机效果）
        async function addBotMessage(text) {
            const container = document.getElementById('chatContainer');
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            
            const msgId = 'msg_' + Date.now();
            container.innerHTML += `
                <div class="chat-message bot-message" id="${msgId}">
                    <div class="message-avatar">🌿</div>
                    <div class="message-content">

                        <div class="message-time">${time}</div>
                    </div>
                </div>
            `;
            scrollToBottom();
            
            const textEl = document.getElementById(`text_${msgId}`);
            const lines = text.split('\n');
            let currentLine = 0;
            let currentChar = 0;
            
            return new Promise(resolve => {
                function typeChar() {
                    if (currentLine >= lines.length) {
                        const cursor = document.querySelector(`#${msgId} .typing-cursor`);
                        if (cursor) cursor.remove();
                        resolve();
                        return;
                    }
                    
                    const line = lines[currentLine];
                    if (currentChar < line.length) {
                        textEl.innerHTML += line[currentChar];
                        currentChar++;
                        setTimeout(typeChar, 10);
                    } else {
                        textEl.innerHTML += '<br>';
                        currentLine++;
                        currentChar = 0;
                        setTimeout(typeChar, 30);
                    }
                    scrollToBottom();
                }
                typeChar();
            });
        }

            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;

            if (!query) return;

            const resultsEl = document.getElementById('semanticResults');
            resultsEl.innerHTML = '<div style="text-align: center; padding: 40px;"><div class="loading-dots"><span></span><span></span><span></span></div><p>语义搜索中...</p></div>';

            try {
                const base = isValidApiBase(API_BASE) ? API_BASE : DEFAULT_API_BASE;
                const resp = await fetch(`${base}/api/semantic/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, top_k: 10 })
                });

                const data = await resp.json();

                if (data.success) {
                    const results = data.data.results;
                    let html = `<div style="margin-bottom: 10px; color: #5a5a5a; font-size: 13px;">查询: "${query}" | 引擎: ${data.data.engine || 'semantic'}</div>`;

                    // 按来源分组展示
                    const grouped = {};
                    for (const source in results) {
                        if (results[source].length > 0) {
                            grouped[source] = results[source];
                        }
                    }

                    for (const [source, items] of Object.entries(grouped)) {
                        html += `<div style="margin-bottom: 15px;">
                            <div style="font-weight: bold; color: #a53232; margin-bottom: 8px; font-size: 13px;">《${source}》</div>
                            ${items.map(item => `
                                <div style="background: #fffdf8; border-radius: 4px; padding: 10px; margin-bottom: 6px; border-left: 3px solid #4a7c59;">
                                    <div style="color: #5a5a5a; font-size: 13px; line-height: 1.6;">${escapeHtml(item.text?.substring(0, 200) || '')}...</div>
                                    <div style="color: #8b7355; font-size: 11px; margin-top: 6px;">篇章: ${escapeHtml(item.source_section || '')} | 相似度: ${(item.score * 100).toFixed(1)}%</div>
                                </div>
                            `).join('')}
                        </div>`;
                    }

                    resultsEl.innerHTML = html;
                } else {
                    resultsEl.innerHTML = `<p style="text-align: center; color: #8b7355; padding: 40px;">${data.error || '搜索失败'}</p>`;
                }
            } catch (e) {
                resultsEl.innerHTML = `<p style="text-align: center; color: #8b7355; padding: 40px;">搜索失败: ${e.message}</p>`;
            }
        }

        async function apiRequest(method, path, body) {
            const inputBase = document.getElementById('apiBase').value;
            const base = inputBase || (isValidApiBase(API_BASE) ? API_BASE : DEFAULT_API_BASE);
            const responseEl = document.getElementById('apiResponse');
            responseEl.textContent = '请求中...';
            
            try {
                const options = {
                    method: method,
                    headers: { 'Content-Type': 'application/json' }
                };
                if (body) options.body = JSON.stringify(body);
                
                const resp = await fetch(`${base}${path}`, options);
                const data = await resp.json();
                responseEl.innerHTML = syntaxHighlight(data);
            } catch (e) {
                responseEl.textContent = `错误: ${e.message}`;
            }
        }
        
        function syntaxHighlight(json) {
            if (typeof json !== 'string') json = JSON.stringify(json, null, 2);
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?)/g, function(match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) cls = 'json-key';
                    else cls = 'json-string';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

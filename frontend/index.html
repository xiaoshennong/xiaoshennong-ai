<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小神农中医AI v5.0 - Agent+语义匹配</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: #f8f5f0;
            color: #333;
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 头部 */
        .header {
            background: linear-gradient(135deg, #4a7c59 0%, #2d5016 100%);
            color: white;
            padding: 12px 20px;
            text-align: center;
            flex-shrink: 0;
        }
        .header h1 { font-size: 18px; margin-bottom: 2px; }
        .header .subtitle { font-size: 11px; opacity: 0.9; }
        .header .api-status {
            display: inline-block;
            margin-top: 6px;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            background: rgba(255,255,255,0.2);
        }
        .api-status.connected { background: #52c41a; }
        .api-status.disconnected { background: #ff4d4f; }
        
        /* 功能标签 */
        .feature-tags {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 6px;
            background: white;
            border-bottom: 1px solid #e8e8e8;
            flex-shrink: 0;
        }
        .feature-tag {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            background: #e8f5e9;
            color: #2d5016;
        }
        .feature-tag.disabled { background: #f0f0f0; color: #999; text-decoration: line-through; }
        
        /* 导航 */
        .nav {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 8px;
            background: white;
            border-bottom: 1px solid #e8e8e8;
            flex-shrink: 0;
        }
        .nav-btn {
            padding: 5px 14px;
            border: none;
            border-radius: 16px;
            background: #f0f0f0;
            color: #666;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .nav-btn:hover { background: #e8f5e9; color: #4a7c59; }
        .nav-btn.active {
            background: linear-gradient(135deg, #4a7c59 0%, #2d5016 100%);
            color: white;
        }
        
        /* 内容区 */
        .container {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .section {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }
        .section.active { display: flex; }
        
        /* 聊天界面 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        
        .chat-message {
            display: flex;
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            margin-right: 10px;
        }
        .bot-message .message-avatar { background: #e8f5e9; }
        .user-message .message-avatar { background: #2d5016; color: white; }
        .thinking-message .message-avatar { background: #fff8e1; }
        
        .message-content { flex: 1; max-width: calc(100% - 50px); }
        
        .message-bubble {
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
        }
        .bot-message .message-bubble {
            background: white;
            border: 1px solid #e8e8e8;
            border-top-left-radius: 4px;
        }
        .user-message .message-bubble {
            background: linear-gradient(135deg, #4a7c59 0%, #2d5016 100%);
            color: white;
            border-top-right-radius: 4px;
            margin-left: auto;
            max-width: 80%;
        }
        .user-message { flex-direction: row-reverse; }
        .user-message .message-avatar { margin-right: 0; margin-left: 10px; }
        .user-message .message-content { display: flex; justify-content: flex-end; }
        
        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            padding: 0 5px;
        }
        
        /* AI思考过程 - 实时流式展示 */
        .thinking-process {
            background: #fff8e1;
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
            border-left: 3px solid #f9a825;
        }
        .thinking-title {
            font-weight: bold;
            color: #8b7355;
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .thinking-step {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
            padding: 8px;
            background: white;
            border-radius: 6px;
            font-size: 13px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.5s ease;
        }
        .thinking-step.visible {
            opacity: 1;
            transform: translateX(0);
        }
        .step-number {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #f9a825;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .step-content { flex: 1; }
        .step-agent { font-weight: 500; color: #333; margin-bottom: 2px; }
        .step-desc { color: #666; font-size: 12px; }
        .step-status {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            flex-shrink: 0;
        }
        .status-completed { background: #e8f5e9; color: #4a7c59; }
        .status-thinking { background: #fff8e1; color: #f9a825; }
        .status-warning { background: #ffebee; color: #c62828; }
        
        .thinking-summary {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        /* 打字机效果 */
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #4a7c59;
            animation: blink 0.8s infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        /* 输入区 */
        .chat-input-area {
            background: white;
            border-top: 1px solid #e8e8e8;
            padding: 10px 15px;
            flex-shrink: 0;
        }
        .quick-symptoms {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .quick-symptoms::-webkit-scrollbar { display: none; }
        .quick-tag {
            padding: 6px 14px;
            background: #f0f0f0;
            border-radius: 16px;
            font-size: 13px;
            color: #555;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            border: none;
        }
        .quick-tag:hover {
            background: #e8f5e9;
            color: #4a7c59;
        }
        
        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .chat-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
            max-height: 120px;
        }
        .chat-input:focus { border-color: #4a7c59; }
        .send-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #4a7c59 0%, #2d5016 100%);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .send-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(45,80,22,0.3); }
        .send-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        
        /* 加载动画 */
        .loading-dots {
            display: flex;
            gap: 4px;
            padding: 10px 0;
        }
        .loading-dots span {
            width: 8px;
            height: 8px;
            background: #4a7c59;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite both;
        }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        /* 结果卡片 */
        .result-card {
            background: #f8f5f0;
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
        }
        .result-constitution {
            display: inline-block;
            background: linear-gradient(135deg, #4a7c59 0%, #2d5016 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .result-section-title {
            font-weight: bold;
            color: #4a7c59;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .result-section-content {
            color: #555;
            line-height: 1.8;
            font-size: 14px;
        }
        
        /* 警告 */
        .warning-box {
            background: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .warning-icon { font-size: 16px; }
        .warning-text { color: #8b7355; font-size: 12px; line-height: 1.5; }
        
        /* 其他页面 */
        .page-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card-title {
            font-size: 18px;
            font-weight: bold;
            color: #2d5016;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e8f5e9;
        }
        
        /* 搜索 */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        .search-input:focus { border-color: #4a7c59; }
        .search-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #4a7c59 0%, #2d5016 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        
        /* JSON */
        .json-viewer {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
        }
        .json-key { color: #9cdcfe; }
        .json-string { color: #ce9178; }
        .json-number { color: #b5cea8; }
        
        /* Agent卡片 */
        .agent-card {
            background: #f0f7f0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #4a7c59;
        }
        .agent-name { font-weight: bold; color: #2d5016; font-size: 14px; }
        .agent-desc { color: #666; font-size: 12px; margin-top: 4px; }
        .agent-stats { display: flex; gap: 15px; margin-top: 8px; font-size: 12px; }
        .agent-stat { color: #4a7c59; }
        
        /* 响应式 */
        @media (max-width: 600px) {
            .header h1 { font-size: 16px; }
            .nav-btn { padding: 4px 10px; font-size: 11px; }
            .chat-input { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌿 小神农中医AI v5.0</h1>
        <div class="subtitle">Agent协作 · 语义匹配 · 批判性思维 · 可溯源</div>
        <div class="api-status disconnected" id="apiStatus">API连接中...</div>
    </div>
    
    <!-- 功能标签 -->
    <div class="feature-tags">
        <span class="feature-tag" id="tagSemantic">🔍 语义匹配</span>
        <span class="feature-tag" id="tagAgent">🤖 多Agent</span>
        <span class="feature-tag" id="tagThinking">🧠 思考过程</span>
        <span class="feature-tag" id="tagStream">⚡ 流式响应</span>
    </div>
    
    <div class="nav">
        <button class="nav-btn active" onclick="showSection('chat')">💬 对话</button>
        <button class="nav-btn" onclick="showSection('semantic')">🔍 语义搜索</button>
        <button class="nav-btn" onclick="showSection('agents')">🤖 Agent系统</button>
        <button class="nav-btn" onclick="showSection('api')">🔧 API测试</button>
    </div>
    
    <div class="container">
        <!-- 对话页面 -->
        <div class="section active" id="section-chat">
            <div class="chat-container" id="chatContainer"></div>
            
            <div class="chat-input-area">
                <div class="quick-symptoms" id="quickSymptoms">
                    <span class="quick-tag" onclick="sendQuick('我最近失眠')">失眠</span>
                    <span class="quick-tag" onclick="sendQuick('头痛')">头痛</span>
                    <span class="quick-tag" onclick="sendQuick('胃不舒服')">胃痛</span>
                    <span class="quick-tag" onclick="sendQuick('口干口苦')">口干</span>
                    <span class="quick-tag" onclick="sendQuick('腰酸乏力')">腰酸</span>
                    <span class="quick-tag" onclick="sendQuick('月经不调')">月经</span>
                </div>
                <div class="input-row">
                    <textarea 
                        class="chat-input" 
                        id="chatInput" 
                        placeholder="描述您的症状，如：最近失眠多梦，口干口苦..."
                        rows="1"
                        oninput="autoResize(this)"
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                    <button class="send-btn" onclick="sendMessage()" id="sendBtn">发送</button>
                </div>
            </div>
        </div>
        
        <!-- 语义搜索页面 -->
        <div class="section" id="section-semantic">
            <div class="page-content">
                <div class="card">
                    <div class="card-title">🔍 语义搜索测试</div>
                    <div class="search-box">
                        <input type="text" class="search-input" id="semanticInput" 
                               placeholder="输入症状描述，如：睡不着、胃疼、头晕..." 
                               onkeypress="if(event.key==='Enter') testSemanticSearch()">
                        <button class="search-btn" onclick="testSemanticSearch()">搜索</button>
                    </div>
                    <div id="semanticResults"></div>
                </div>
            </div>
        </div>
        
        <!-- Agent系统页面 -->
        <div class="section" id="section-agents">
            <div class="page-content">
                <div class="card">
                    <div class="card-title">🤖 多Agent协作系统</div>
                    <div id="agentList"></div>
                </div>
                <div class="card">
                    <div class="card-title">📊 Agent分析测试</div>
                    <div class="search-box">
                        <input type="text" class="search-input" id="agentInput" 
                               placeholder="输入症状让Agent分析..." 
                               onkeypress="if(event.key==='Enter') testAgentAnalysis()">
                        <button class="search-btn" onclick="testAgentAnalysis()">分析</button>
                    </div>
                    <div id="agentResult"></div>
                </div>
            </div>
        </div>
        
        <!-- API测试页面 -->
        <div class="section" id="section-api">
            <div class="page-content">
                <div class="card">
                    <div class="card-title">🔧 API接口测试</div>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; color: #555;">API地址</label>
                        <input type="text" class="search-input" id="apiBase" value="http://43.247.135.91:5005">
                    </div>
                    <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                        <button class="search-btn" onclick="testHealth()">测试健康</button>
                        <button class="search-btn" onclick="testDiagnosis()">测试辨证</button>
                        <button class="search-btn" onclick="testSemantic()">测试语义</button>
                        <button class="search-btn" onclick="testAgents()">测试Agent</button>
                    </div>
                    <div class="json-viewer" id="apiResponse">点击上方按钮测试API...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // API配置
        const API_BASE = 'http://43.247.135.91:5005';
        let isProcessing = false;
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            checkAPIStatus();
            initChat();
            loadAgentList();
        });
        
        // 检查API状态
        async function checkAPIStatus() {
            const statusEl = document.getElementById('apiStatus');
            try {
                const resp = await fetch(`${API_BASE}/api/health`, { method: 'GET' });
                if (resp.ok) {
                    const data = await resp.json();
                    const features = data.features || {};
                    
                    statusEl.textContent = `API已连接 v${data.version} | 知识库: ${Object.values(data.knowledge).filter(v => typeof v === 'number').reduce((a,b) => a+b, 0)}条`;
                    statusEl.className = 'api-status connected';
                    
                    // 更新功能标签
                    document.getElementById('tagSemantic').className = features.semantic_search ? 'feature-tag' : 'feature-tag disabled';
                    document.getElementById('tagAgent').className = features.agent_system ? 'feature-tag' : 'feature-tag disabled';
                    document.getElementById('tagThinking').className = 'feature-tag';
                    document.getElementById('tagStream').className = 'feature-tag';
                } else {
                    throw new Error('API error');
                }
            } catch (e) {
                statusEl.textContent = 'API未连接 - 请检查服务器';
                statusEl.className = 'api-status disconnected';
            }
        }
        
        // 初始化聊天
        async function initChat() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
            
            await addBotMessage(`您好！我是小神农AI助手 v5.0 🌿

我具备以下能力：
• 🤖 多Agent协作分析（症状/药物/方剂/副作用）
• 🔍 语义匹配搜索（理解同义词、近义词）
• 🧠 实时思考过程展示
• 📚 基于权威知识库的可溯源回答

请描述您的症状，我会逐步分析并给出建议。`);
        }
        
        // 切换页面
        function showSection(name) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`section-${name}`).classList.add('active');
            event.target.classList.add('active');
        }
        
        // 自动调整输入框高度
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }
        
        // 回车发送
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        // 发送快捷消息
        function sendQuick(text) {
            document.getElementById('chatInput').value = text;
            sendMessage();
        }
        
        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            
            if (!text || isProcessing) return;
            
            addUserMessage(text);
            input.value = '';
            input.style.height = 'auto';
            
            isProcessing = true;
            document.getElementById('sendBtn').disabled = true;
            
            try {
                // 使用流式API
                await streamDiagnosis(text);
            } catch (e) {
                console.error('Error:', e);
                // fallback到普通API
                try {
                    await normalDiagnosis(text);
                } catch (e2) {
                    await addBotMessage('抱歉，连接失败。请确保后端服务已启动。');
                }
            } finally {
                isProcessing = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }
        
        // 流式诊断 - 实时展示思考过程
        async function streamDiagnosis(text) {
            const container = document.getElementById('chatContainer');
            
            // 创建思考过程消息
            const thinkingId = 'thinking_' + Date.now();
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            
            container.innerHTML += `
                <div class="chat-message thinking-message" id="${thinkingId}">
                    <div class="message-avatar">🧠</div>
                    <div class="message-content">
                        <div class="message-bubble">
                            <div class="thinking-process">
                                <div class="thinking-title">
                                    <span>🧠</span> AI正在分析...
                                </div>
                                <div id="steps_${thinkingId}"></div>
                                <div class="loading-dots" id="loading_${thinkingId}">
                                    <span></span><span></span><span></span>
                                </div>
                            </div>
                        </div>
                        <div class="message-time">${time}</div>
                    </div>
                </div>
            `;
            scrollToBottom();
            
            const stepsContainer = document.getElementById(`steps_${thinkingId}`);
            
            try {
                const resp = await fetch(`${API_BASE}/api/diagnosis/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symptoms: text, query: text })
                });
                
                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                
                let resultData = null;
                let stepCount = 0;
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n\n');
                    
                    for (const line of lines) {
                        if (!line.trim() || !line.startsWith('data: ')) continue;
                        
                        try {
                            const data = JSON.parse(line.substring(6));
                            
                            if (data.type === 'thinking') {
                                // 添加思考步骤
                                const thought = data.data;
                                stepCount++;
                                
                                const statusClass = thought.status === 'completed' ? 'status-completed' : 
                                                   thought.status === 'warning' ? 'status-warning' : 'status-thinking';
                                const statusText = thought.status === 'completed' ? '✓' : 
                                                  thought.status === 'warning' ? '⚠' : '●';
                                
                                const stepHtml = `
                                    <div class="thinking-step visible" id="step_${thinkingId}_${stepCount}">
                                        <div class="step-number">${thought.step}</div>
                                        <div class="step-content">
                                            <div class="step-agent">${thought.agent}</div>
                                            <div class="step-desc">${thought.content}</div>
                                            <div class="step-desc" style="color: #999; font-size: 11px; margin-top: 2px;">${thought.detail || ''}</div>
                                        </div>
                                        <span class="step-status ${statusClass}">${statusText}</span>
                                    </div>
                                `;
                                
                                stepsContainer.innerHTML += stepHtml;
                                scrollToBottom();
                                
                            } else if (data.type === 'result') {
                                resultData = data.data;
                                // 隐藏加载动画
                                const loading = document.getElementById(`loading_${thinkingId}`);
                                if (loading) loading.style.display = 'none';
                                
                                // 添加完成标记
                                stepsContainer.innerHTML += `
                                    <div class="thinking-step visible">
                                        <div class="step-number" style="background: #4a7c59;">✓</div>
                                        <div class="step-content">
                                            <div class="step-agent">分析完成</div>
                                            <div class="step-desc">正在生成最终报告...</div>
                                        </div>
                                        <span class="step-status status-completed">完成</span>
                                    </div>
                                `;
                                scrollToBottom();
                                
                            } else if (data.type === 'done') {
                                // 流结束，显示结果
                                if (resultData) {
                                    // 淡出思考过程
                                    setTimeout(() => {
                                        const thinkingEl = document.getElementById(thinkingId);
                                        if (thinkingEl) {
                                            thinkingEl.style.opacity = '0.3';
                                            thinkingEl.style.transition = 'opacity 2s';
                                        }
                                    }, 3000);
                                    
                                    // 显示结果
                                    await showDiagnosisResult(resultData.diagnosis);
                                }
                            }
                        } catch (e) {
                            console.error('Parse error:', e, line);
                        }
                    }
                }
            } catch (e) {
                console.error('Stream error:', e);
                throw e; // 触发fallback
            }
        }

        // 添加Bot消息（打字机效果）
        async function addBotMessage(text) {
            const container = document.getElementById('chatContainer');
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            
            const msgId = 'msg_' + Date.now();
            container.innerHTML += `
                <div class="chat-message bot-message" id="${msgId}">
                    <div class="message-avatar">🌿</div>
                    <div class="message-content">
                        <div class="message-bubble">
                            <span id="text_${msgId}"></span><span class="typing-cursor"></span>
                        </div>
                        <div class="message-time">${time}</div>
                    </div>
                </div>
            `;
            scrollToBottom();
            
            const textEl = document.getElementById(`text_${msgId}`);
            const lines = text.split('\n');
            let currentLine = 0;
            let currentChar = 0;
            
            return new Promise(resolve => {
                function typeChar() {
                    if (currentLine >= lines.length) {
                        const cursor = document.querySelector(`#${msgId} .typing-cursor`);
                        if (cursor) cursor.remove();
                        resolve();
                        return;
                    }
                    
                    const line = lines[currentLine];
                    if (currentChar < line.length) {
                        textEl.innerHTML += line[currentChar];
                        currentChar++;
                        setTimeout(typeChar, 10);
                    } else {
                        textEl.innerHTML += '<br>';
                        currentLine++;
                        currentChar = 0;
                        setTimeout(typeChar, 30);
                    }
                    scrollToBottom();
                }
                typeChar();
            });
        }

            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;

                    for (const [type, items] of Object.entries(grouped)) {
                        html += `<div style="margin-bottom: 15px;">
                            <div style="font-weight: bold; color: #2d5016; margin-bottom: 8px; text-transform: uppercase; font-size: 12px;">${type}</div>
                            ${items.map(item => `
                                <div style="background: white; border-radius: 8px; padding: 10px; margin-bottom: 6px; border-left: 3px solid #4a7c59;">
                                    <div style="font-weight: 500; color: #333;">${item.metadata?.name || item.id} <span style="font-size: 11px; color: #999;">${item.id}</span></div>
                                    <div style="color: #666; font-size: 12px; margin-top: 4px;">${item.text?.substring(0, 100) || ''}...</div>
                                    <div style="color: #4a7c59; font-size: 11px; margin-top: 4px;">相似度: ${(item.score * 100).toFixed(1)}%</div>
                                </div>
                            `).join('')}
                        </div>`;
                    }

                } else {
                    resultsEl.innerHTML = `<p style="text-align: center; color: #999; padding: 40px;">${data.error || '搜索失败'}</p>`;
                }
            } catch (e) {
                resultsEl.innerHTML = `<p style="text-align: center; color: #999; padding: 40px;">搜索失败: ${e.message}</p>`;
            }
        }

        async function apiRequest(method, path, body) {
            const base = document.getElementById('apiBase').value || API_BASE;
            const responseEl = document.getElementById('apiResponse');
            responseEl.textContent = '请求中...';
            
            try {
                const options = {
                    method: method,
                    headers: { 'Content-Type': 'application/json' }
                };
                if (body) options.body = JSON.stringify(body);
                
                const resp = await fetch(`${base}${path}`, options);
                const data = await resp.json();
                responseEl.innerHTML = syntaxHighlight(data);
            } catch (e) {
                responseEl.textContent = `错误: ${e.message}`;
            }
        }
        
        function syntaxHighlight(json) {
            if (typeof json !== 'string') json = JSON.stringify(json, null, 2);
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?)/g, function(match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) cls = 'json-key';
                    else cls = 'json-string';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小神农中医AI - 知识图谱可视化</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>:root {
    --paper: #f7f3e9;
    --paper-dark: #efe8d8;
    --ink: #2b2b2b;
    --ink-light: #5a5a5a;
    --cinnabar: #a53232;
    --cinnabar-light: #c45c48;
        --jade: #4a7c59;
    --jade-dark: #2d4a35;
    --gold: #b8860b;
    --gold-light: #d4a84b;
    --border: #d4c4b0;
    --shadow: rgba(43, 27, 18, 0.12);
}


/* 卷轴/卡片的回纹角饰 */
.card, .result-card {
    position: relative;
}
.card::before, .card::after,
.result-card::before, .result-card::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border: 2px solid #a53232;
    pointer-events: none;
}
.card::before, .result-card::before {
    top: 10px;
    left: 10px;
    border-right: none;
    border-bottom: none;
}
.card::after, .result-card::after {
    bottom: 10px;
    right: 10px;
    border-left: none;
    border-top: none;
}


        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', 'STSong', serif;
            background: #f7f3e9;
            color: #2b2b2b;
            height: 100vh;
            overflow: hidden;
        }
/* 宣纸纹理背景 */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image:
        radial-gradient(circle at 20% 30%, rgba(180, 160, 130, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(160, 140, 110, 0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: -1;
}

        .header {
            background: linear-gradient(180deg, #2b2b2b 0%, #1f1f1f 100%);
            color: #e8dcc8;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 56px;
            flex-shrink: 0;
        }
        .header h1 { font-size: 18px; }
        .header .subtitle { font-size: 12px; opacity: 0.9; }
        .header .back-link {
            color: white;
            text-decoration: none;
            font-size: 13px;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 4px;
        }
        .header .back-link:hover { background: rgba(255,255,255,0.15); }

        .main {
            display: flex;
            height: calc(100vh - 56px);
        }

        /* 左侧面板 */
        .left-panel {
            width: 280px;
            background: #fffdf8;
            border-right: 1px solid #d4c4b0;
            padding: 15px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .panel-title {
            font-size: 14px;
            font-weight: bold;
            color: #8a2525;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #f0e8d8;
        }
        .search-box {
            margin-bottom: 15px;
        }
        .search-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d4c4b0;
            border-radius: 2px;
            font-size: 13px;
            outline: none;
        }
        .search-input:focus { border-color: #a53232; }

        .filter-group { margin-bottom: 15px; }
        .filter-label {
            font-size: 12px;
            color: #5a5a5a;
            margin-bottom: 8px;
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            font-size: 13px;
            cursor: pointer;
        }
        .filter-item input { cursor: pointer; }
        .type-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .stats-card {
            background: #f7f3e9;
            border-radius: 2px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 4px 0;
            border-bottom: 1px dashed #d4c4b0;
        }
        .stat-row:last-child { border-bottom: none; }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 2px;
            background: linear-gradient(135deg, #a53232 0%, #8a2525 100%);
            color: white;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .btn:hover { opacity: 0.9; }
        .btn-secondary {
            background: #efe8d8;
            color: #2b2b2b;
        }

        /* 中间图谱 */
        .graph-container {
            flex: 1;
            position: relative;
            background: #f7f3e9;
            overflow: hidden;
        }
        #kg-graph { width: 100%; height: 100%; }

        .legend {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(255,255,255,0.95);
            padding: 12px;
            border-radius: 2px;
            box-shadow: 0 2px 8px rgba(43, 27, 18, 0.16);
            font-size: 12px;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
        .legend-item:last-child { margin-bottom: 0; }

        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 2px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            max-width: 250px;
            z-index: 1000;
        }

        /* 右侧面板 */
        .right-panel {
            width: 320px;
            background: #fffdf8;
            border-left: 1px solid #d4c4b0;
            padding: 15px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .empty-state {
            text-align: center;
            color: #8b7355;
            padding: 40px 20px;
            font-size: 13px;
        }
        .detail-card {
            background: #f7f3e9;
            border-radius: 2px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .detail-title {
            font-size: 13px;
            font-weight: bold;
            color: #8a2525;
            margin-bottom: 8px;
        }
        .detail-row {
            font-size: 12px;
            padding: 4px 0;
            color: #5a5a5a;
        }
        .detail-label { color: #8b7355; margin-right: 6px; }
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 11px;
            margin-right: 4px;
            margin-bottom: 4px;
        }
        .tag-drug { background: #f0e8d8; color: #8a2525; }
        .tag-symptom { background: #f7f3e9; color: #a53232; }
        .tag-formula { background: #f7f3e9; color: #8a2525; }
        .tag-syndrome { background: #f7f3e9; color: #4a7c59; }

        .related-list {
            list-style: none;
        }
        .related-list li {
            padding: 6px 0;
            border-bottom: 1px dashed #d4c4b0;
            font-size: 12px;
            cursor: pointer;
            color: #a53232;
        }
        .related-list li:hover { color: #8a2525; }
        .related-list li:last-child { border-bottom: none; }

        .severity-high { color: #a53232; font-weight: bold; }
        .severity-medium { color: #b8860b; }
        .severity-low { color: #a53232; }

        /* 响应式 */
        @media (max-width: 900px) {
            .left-panel, .right-panel { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🌿 小神农中医AI · 知识图谱可视化</h1>
            <div class="subtitle">症状 · 药物 · 方剂 · 证型 · 患者 · 副作用 · 共现关系</div>
        </div>
        <a href="index.html" class="back-link">← 返回主界面</a>
    </div>

    <div class="main">
        <div class="left-panel">
            <div class="panel-title">🔍 搜索与筛选</div>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索症状、药物、方剂..." oninput="handleSearch()">
            </div>

            <div class="filter-group">
                <div class="filter-label">节点类型</div>
                <div id="typeFilters"></div>
            </div>

            <div class="filter-group">
                <div class="filter-label">关系类型</div>
                <div id="relationFilters"></div>
            </div>

            <button class="btn" onclick="resetView()">重置视图</button>
            <button class="btn btn-secondary" onclick="runSideEffectDemo()">🧪 副作用辨别演示</button>

            <div class="panel-title" style="margin-top: 20px;">📊 图谱统计</div>
            <div class="stats-card" id="statsCard">
                <div class="stat-row"><span>节点总数</span><span id="statNodes">-</span></div>
                <div class="stat-row"><span>关系总数</span><span id="statLinks">-</span></div>
                <div class="stat-row"><span>药物</span><span id="statDrugs">-</span></div>
                <div class="stat-row"><span>症状</span><span id="statSymptoms">-</span></div>
                <div class="stat-row"><span>方剂</span><span id="statFormulas">-</span></div>
                <div class="stat-row"><span>患者</span><span id="statPatients">-</span></div>
            </div>
        </div>

        <div class="graph-container">
            <svg id="kg-graph"></svg>
            <div class="legend" id="legend"></div>
            <div class="tooltip" id="tooltip"></div>
        </div>

        <div class="right-panel" id="rightPanel">
            <div class="panel-title">📋 节点详情</div>
            <div class="empty-state" id="emptyState">
                点击图谱中的节点<br>查看详细信息
            </div>
            <div id="detailContent" style="display: none;"></div>
        </div>
    </div>

    <script>
        // 配置
        const TYPE_COLORS = {
            drug: '#a53232',
            symptom: '#4a7c59',
            syndrome: '#b8860b',
            formula: '#8b7355',
            patient: '#c45c48',
            adverse: '#a53232',
            cluster: '#5a5a5a'
        };
        const TYPE_LABELS = {
            drug: '药物',
            symptom: '症状',
            syndrome: '证型',
            formula: '方剂',
            patient: '患者',
            adverse: '副作用',
            cluster: '聚类'
        };
        const RELATION_COLORS = {
            '组成': '#8b7355',
            '治疗': '#4a7c59',
            '治疗证型': '#b8860b',
            '主治症状': '#a53232',
            '主治证型': '#b8860b',
            '副作用': '#a53232',
            '共现': '#b8860b',
            '患者症状': '#4a7c59',
            '患者用药': '#8b7355',
            '相似患者': '#5a5a5a',
            '十八反': '#a53232',
            '十九畏': '#a53232',
            '七情配伍': '#4a7c59'
        };

        let graphData = { nodes: [], links: [] };
        let simulation;
        let svg, g;
        let activeFilters = new Set(['drug', 'symptom', 'syndrome', 'formula', 'patient']);
        let activeRelations = new Set();
        let selectedNode = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            await loadData();
            initFilters();
            initGraph();
            updateStats();
        });

        async function loadData() {
            // 优先从 API 加载真实图谱数据，其次尝试本地静态路径
            const candidates = [
                'http://localhost:5001/api/kg/graph',
                './data/kg_graph.json',
                '../data/kg_graph.json',
                '/data/kg_graph.json'
            ];

            let lastError = null;
            for (const url of candidates) {
                try {
                    const resp = await fetch(url);
                    if (resp.ok) {
                        const payload = await resp.json();
                        graphData = payload.data || payload;
                        console.log('[KG] 已加载图谱数据:', url);
                        break;
                    }
                } catch (e) {
                    lastError = e;
                }
            }

            if (!graphData || !graphData.nodes) {
                console.warn('未找到 kg_graph.json，使用示例图谱数据', lastError);
                graphData = generateMockGraphData();
            }
            // 预处理：计算度数
            const degreeMap = {};
            graphData.nodes.forEach(n => degreeMap[n.id] = 0);
            graphData.links.forEach(l => {
                degreeMap[l.source] = (degreeMap[l.source] || 0) + 1;
                degreeMap[l.target] = (degreeMap[l.target] || 0) + 1;
            });
            graphData.nodes.forEach(n => n.degree = degreeMap[n.id] || 0);
            // 关系筛选默认全选
            const relTypes = new Set(graphData.links.map(l => l.relation));
            activeRelations = relTypes;
        }

        // 示例图谱数据（当 kg_graph.json 不存在时使用）
        function generateMockGraphData() {
            const nodes = [
                { id: '麻黄', type: 'drug', name: '麻黄' },
                { id: '桂枝', type: 'drug', name: '桂枝' },
                { id: '杏仁', type: 'drug', name: '杏仁' },
                { id: '甘草', type: 'drug', name: '甘草' },
                { id: '麻黄汤', type: 'formula', name: '麻黄汤' },
                { id: '风寒表实证', type: 'syndrome', name: '风寒表实证' },
                { id: '头痛', type: 'symptom', name: '头痛' },
                { id: '发热', type: 'symptom', name: '发热' },
                { id: '恶寒', type: 'symptom', name: '恶寒' },
                { id: '无汗', type: 'symptom', name: '无汗' },
                { id: '伤寒论', type: 'classic', name: '伤寒论' }
            ];
            const links = [
                { source: '麻黄汤', target: '麻黄', relation: '组成' },
                { source: '麻黄汤', target: '桂枝', relation: '组成' },
                { source: '麻黄汤', target: '杏仁', relation: '组成' },
                { source: '麻黄汤', target: '甘草', relation: '组成' },
                { source: '麻黄汤', target: '风寒表实证', relation: '治疗' },
                { source: '风寒表实证', target: '头痛', relation: '主症' },
                { source: '风寒表实证', target: '发热', relation: '主症' },
                { source: '风寒表实证', target: '恶寒', relation: '主症' },
                { source: '风寒表实证', target: '无汗', relation: '主症' },
                { source: '麻黄汤', target: '伤寒论', relation: '出自' }
            ];
            return { nodes, links };
        }

        function initFilters() {
            const typeContainer = document.getElementById('typeFilters');
            Object.keys(TYPE_COLORS).forEach(type => {
                if (!graphData.nodes.some(n => n.type === type)) return;
                const item = document.createElement('div');
                item.className = 'filter-item';
                item.innerHTML = `
                    <input type="checkbox" id="filter-${type}" checked onchange="toggleType('${type}')">
                    <span class="type-dot" style="background: ${TYPE_COLORS[type]}"></span>
                    <label for="filter-${type}">${TYPE_LABELS[type]}</label>
                `;
                typeContainer.appendChild(item);
            });

            const relContainer = document.getElementById('relationFilters');
            const relTypes = [...new Set(graphData.links.map(l => l.relation))];
            relTypes.forEach(rel => {
                const item = document.createElement('div');
                item.className = 'filter-item';
                item.innerHTML = `
                    <input type="checkbox" id="rel-${rel}" checked onchange="toggleRelation('${rel}')">
                    <span class="type-dot" style="background: ${RELATION_COLORS[rel] || '#8b7355'}"></span>
                    <label for="rel-${rel}">${rel}</label>
                `;
                relContainer.appendChild(item);
            });

            // 图例
            const legend = document.getElementById('legend');
            Object.keys(TYPE_COLORS).forEach(type => {
                if (!graphData.nodes.some(n => n.type === type)) return;
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `<span class="type-dot" style="background: ${TYPE_COLORS[type]}"></span><span>${TYPE_LABELS[type]}</span>`;
                legend.appendChild(item);
            });
        }

        function initGraph() {
            const container = document.querySelector('.graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            svg = d3.select('#kg-graph')
                .attr('width', width)
                .attr('height', height);

            // 清空
            svg.selectAll('*').remove();

            // 缩放
            const zoom = d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });
            svg.call(zoom);

            g = svg.append('g');

            // 过滤数据
            const filtered = getFilteredData();

            // 力导向模拟
            simulation = d3.forceSimulation(filtered.nodes)
                .force('link', d3.forceLink(filtered.links).id(d => d.id).distance(d => {
                    if (d.relation === '组成') return 50;
                    if (d.relation === '副作用') return 80;
                    if (d.relation === '共现') return 100;
                    return 120;
                }))
                .force('charge', d3.forceManyBody().strength(-150))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(d => getNodeRadius(d) + 5));

            // 绘制连线
            const link = g.append('g')
                .attr('class', 'links')
                .selectAll('line')
                .data(filtered.links)
                .enter().append('line')
                .attr('stroke', d => RELATION_COLORS[d.relation] || '#d4c4b0')
                .attr('stroke-width', d => d.relation === '十八反' || d.relation === '十九畏' ? 3 : 1.5)
                .attr('stroke-opacity', 0.6)
                .attr('stroke-dasharray', d => d.relation === '副作用' ? '5,3' : null);

            // 绘制节点
            const node = g.append('g')
                .attr('class', 'nodes')
                .selectAll('g')
                .data(filtered.nodes)
                .enter().append('g')
                .attr('class', 'node')
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended))
                .on('click', (event, d) => selectNode(d))
                .on('mouseover', (event, d) => showTooltip(event, d))
                .on('mouseout', hideTooltip);

            node.append('circle')
                .attr('r', d => getNodeRadius(d))
                .attr('fill', d => TYPE_COLORS[d.type])
                .attr('stroke', '#fffdf8')
                .attr('stroke-width', 2)
                .attr('opacity', 0.9);

            node.append('text')
                .attr('dy', d => getNodeRadius(d) + 14)
                .attr('text-anchor', 'middle')
                .text(d => d.label)
                .attr('font-size', '11px')
                .attr('fill', '#2b2b2b')
                .attr('pointer-events', 'none');

            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);

                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });
        }

        function getFilteredData() {
            const nodeMap = {};
            const nodes = graphData.nodes.filter(n => activeFilters.has(n.type));
            nodes.forEach(n => nodeMap[n.id] = n);

            const links = graphData.links.filter(l => {
                return activeRelations.has(l.relation) && nodeMap[l.source] && nodeMap[l.target];
            }).map(l => ({
                ...l,
                source: nodeMap[l.source],
                target: nodeMap[l.target]
            }));

            return { nodes, links };
        }

        function getNodeRadius(d) {
            if (d.type === 'formula') return 10 + Math.sqrt(d.degree || 1) * 1.5;
            if (d.type === 'drug') return 8 + Math.sqrt(d.degree || 1);
            return 6 + Math.sqrt(d.degree || 1) * 0.8;
        }

        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = `<strong>${d.label}</strong><br>${TYPE_LABELS[d.type]}<br>连接数: ${d.degree}`;
            tooltip.style.left = (event.pageX + 10) + 'px';
            tooltip.style.top = (event.pageY + 10) + 'px';
            tooltip.style.opacity = 1;
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.opacity = 0;
        }

        function selectNode(d) {
            selectedNode = d;
            const panel = document.getElementById('rightPanel');
            document.getElementById('emptyState').style.display = 'none';
            const content = document.getElementById('detailContent');
            content.style.display = 'block';

            let html = '';

            // 基本信息
            html += `<div class="detail-card">
                <div class="detail-title">${TYPE_LABELS[d.type]} · ${d.label}</div>
                <div class="detail-row"><span class="detail-label">ID</span>${d.id}</div>
                <div class="detail-row"><span class="detail-label">连接数</span>${d.degree}</div>`;

            if (d.type === 'drug') {
                html += `<div class="detail-row"><span class="detail-label">类别</span>${d.category || '-'}</div>`;
                html += `<div class="detail-row"><span class="detail-label">性味</span>${(d.properties && d.properties.nature) || '-'} ${(d.properties && d.properties.taste) || '-'}</div>`;
                html += `<div class="detail-row"><span class="detail-label">归经</span>${(d.properties && d.properties.meridian && d.properties.meridian.join('、')) || '-'}</div>`;
                html += `<div class="detail-row"><span class="detail-label">可信度</span>${d.confidence || '-'}</div>`;
                html += `<div class="detail-row"><span class="detail-label">审核状态</span>${d.review_status || '-'}</div>`;
                if (d.clinical_stats) {
                    html += `<div class="detail-row"><span class="detail-label">有效率</span>${d.clinical_stats.effective_rate || '-'}</div>`;
                    html += `<div class="detail-row"><span class="detail-label">样本量</span>${d.clinical_stats.total_cases || 0}例</div>`;
                }
            } else if (d.type === 'symptom') {
                html += `<div class="detail-row"><span class="detail-label">部位</span>${d.location || '-'}</div>`;
                html += `<div class="detail-row"><span class="detail-label">类型</span>${d.symptom_type || '-'}</div>`;
            } else if (d.type === 'formula') {
                html += `<div class="detail-row"><span class="detail-label">来源</span>${d.source || '-'}</div>`;
                html += `<div class="detail-row"><span class="detail-label">分类</span>${(d.classification && d.classification.main) || '-'}</div>`;
            } else if (d.type === 'syndrome') {
                html += `<div class="detail-row"><span class="detail-label">体系</span>${d.system || '-'}</div>`;
                html += `<div class="detail-row"><span class="detail-label">治则</span>${d.treatment_principle || '-'}</div>`;
            } else if (d.type === 'patient') {
                html += `<div class="detail-row"><span class="detail-label">主诉</span>${d.chief_complaint || '-'}</div>`;
            }
            html += '</div>';

            // 关联节点
            const related = graphData.links
                .filter(l => l.source === d.id || l.target === d.id)
                .map(l => {
                    const isSource = l.source === d.id;
                    const otherId = isSource ? l.target : l.source;
                    const other = graphData.nodes.find(n => n.id === otherId);
                    return {
                        relation: l.relation,
                        otherId,
                        otherLabel: other ? other.label : otherId,
                        otherType: other ? other.type : 'unknown',
                        isSource,
                        details: l
                    };
                });

            // 按关系分组
            const grouped = {};
            related.forEach(r => {
                if (!grouped[r.relation]) grouped[r.relation] = [];
                grouped[r.relation].push(r);
            });

            Object.keys(grouped).forEach(rel => {
                html += `<div class="detail-card">
                    <div class="detail-title">${rel} (${grouped[rel].length})</div>
                    <ul class="related-list">`;
                grouped[rel].forEach(r => {
                    const arrow = r.isSource ? '→' : '←';
                    const tagClass = `tag-${r.otherType}`;
                    let extra = '';
                    if (rel === '副作用') extra = ` (${r.details.incidence || ''} ${r.details.severity || ''})`;
                    if (rel === '共现') extra = ` (强度 ${r.details.strength || '-'})`;
                    if (rel === '组成') extra = ` [${r.details.role || ''}]`;
                    html += `<li onclick="focusNode('${r.otherId}')">${arrow} <span class="tag ${tagClass}">${TYPE_LABELS[r.otherType] || r.otherType}</span> ${r.otherLabel}${extra}</li>`;
                });
                html += '</ul></div>';
            });

            content.innerHTML = html;

            // 高亮节点和邻居
            highlightNeighbors(d.id);
        }

        function highlightNeighbors(nodeId) {
            const neighborIds = new Set([nodeId]);
            graphData.links.forEach(l => {
                if (l.source === nodeId) neighborIds.add(l.target);
                if (l.target === nodeId) neighborIds.add(l.source);
            });

            d3.selectAll('.nodes g')
                .attr('opacity', d => neighborIds.has(d.id) ? 1 : 0.2);
            d3.selectAll('.links line')
                .attr('stroke-opacity', d =>
                    (d.source.id === nodeId || d.target.id === nodeId) ? 1 : 0.05);
        }

        function focusNode(nodeId) {
            const node = graphData.nodes.find(n => n.id === nodeId);
            if (node) {
                selectNode(node);
                // 居中
                const container = document.querySelector('.graph-container');
                const transform = d3.zoomIdentity
                    .translate(container.clientWidth / 2, container.clientHeight / 2)
                    .scale(1.5)
                    .translate(-node.x, -node.y);
                svg.transition().duration(750).call(d3.zoom().transform, transform);
            }
        }

        function toggleType(type) {
            if (activeFilters.has(type)) {
                activeFilters.delete(type);
            } else {
                activeFilters.add(type);
            }
            refreshGraph();
        }

        function toggleRelation(rel) {
            if (activeRelations.has(rel)) {
                activeRelations.delete(rel);
            } else {
                activeRelations.add(rel);
            }
            refreshGraph();
        }

        function refreshGraph() {
            initGraph();
            if (selectedNode) {
                // 如果选中节点仍在过滤后的数据中，保持详情
                const stillVisible = graphData.nodes.some(n => n.id === selectedNode.id && activeFilters.has(n.type));
                if (!stillVisible) {
                    document.getElementById('emptyState').style.display = 'block';
                    document.getElementById('detailContent').style.display = 'none';
                    selectedNode = null;
                    d3.selectAll('.nodes g').attr('opacity', 1);
                    d3.selectAll('.links line').attr('stroke-opacity', 0.6);
                }
            }
            updateStats();
        }

        function handleSearch() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!query) {
                d3.selectAll('.nodes g circle').attr('stroke', '#fffdf8').attr('stroke-width', 2);
                return;
            }

            const matched = graphData.nodes.filter(n =>
                n.label.toLowerCase().includes(query) ||
                n.id.toLowerCase().includes(query)
            );

            d3.selectAll('.nodes g circle')
                .attr('stroke', d => matched.some(m => m.id === d.id) ? '#d4a84b' : '#fffdf8')
                .attr('stroke-width', d => matched.some(m => m.id === d.id) ? 4 : 2);

            if (matched.length === 1) {
                focusNode(matched[0].id);
            }
        }

        function resetView() {
            activeFilters = new Set(['drug', 'symptom', 'syndrome', 'formula', 'patient']);
            activeRelations = new Set(graphData.links.map(l => l.relation));
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
            document.getElementById('searchInput').value = '';
            selectedNode = null;
            refreshGraph();
        }

        function updateStats() {
            const filtered = getFilteredData();
            document.getElementById('statNodes').textContent = filtered.nodes.length;
            document.getElementById('statLinks').textContent = filtered.links.length;
            document.getElementById('statDrugs').textContent = filtered.nodes.filter(n => n.type === 'drug').length;
            document.getElementById('statSymptoms').textContent = filtered.nodes.filter(n => n.type === 'symptom').length;
            document.getElementById('statFormulas').textContent = filtered.nodes.filter(n => n.type === 'formula').length;
            document.getElementById('statPatients').textContent = filtered.nodes.filter(n => n.type === 'patient').length;
        }

        function runSideEffectDemo() {
            // 演示：酸枣仁汤后腹泻
            const patient = graphData.nodes.find(n => n.id === 'PT-20250801-001');
            if (patient) {
                selectNode(patient);
                focusNode(patient.id);
            } else {
                alert('未找到演示患者数据');
            }
        }

        // 窗口大小变化时重绘
        window.addEventListener('resize', () => {
            initGraph();
        });
    </script>
</body>
</html>

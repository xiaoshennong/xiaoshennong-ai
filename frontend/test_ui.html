<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小神农中医AI - 测试平台</title>
    <style>:root {
    --paper: #f7f3e9;
    --paper-dark: #efe8d8;
    --ink: #2b2b2b;
    --ink-light: #5a5a5a;
    --cinnabar: #a53232;
    --cinnabar-light: #c45c48;
        --jade: #4a7c59;
    --jade-dark: #2d4a35;
    --gold: #b8860b;
    --gold-light: #d4a84b;
    --border: #d4c4b0;
    --shadow: rgba(43, 27, 18, 0.12);
}


/* 卷轴/卡片的回纹角饰 */
.card, .result-card {
    position: relative;
}
.card::before, .card::after,
.result-card::before, .result-card::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border: 2px solid #a53232;
    pointer-events: none;
}
.card::before, .result-card::before {
    top: 10px;
    left: 10px;
    border-right: none;
    border-bottom: none;
}
.card::after, .result-card::after {
    bottom: 10px;
    right: 10px;
    border-left: none;
    border-top: none;
}


        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', 'STSong', serif;
            background: #f7f3e9;
            color: #2b2b2b;
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
/* 宣纸纹理背景 */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image:
        radial-gradient(circle at 20% 30%, rgba(180, 160, 130, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(160, 140, 110, 0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: -1;
}

        
        /* 头部 */
        .header {
            background: linear-gradient(180deg, #2b2b2b 0%, #1f1f1f 100%);
            color: #e8dcc8;
            padding: 15px 20px;
            text-align: center;
            flex-shrink: 0;
        }
        .header h1 { font-size: 20px; margin-bottom: 3px; }
        .header .subtitle { font-size: 12px; opacity: 0.9; }
        .header .api-status {
            display: inline-block;
            margin-top: 8px;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 11px;
            background: rgba(255,255,255,0.2);
        }
        .api-status.connected { background: #4a7c59; }
        .api-status.disconnected { background: #a53232; }
        
        /* 导航 */
        .nav {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            background: #fffdf8;
            border-bottom: 1px solid #d4c4b0;
            flex-shrink: 0;
        }
        .nav-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 4px;
            background: #efe8d8;
            color: #5a5a5a;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .nav-btn:hover { background: #f0e8d8; color: #a53232; }
        .nav-btn.active {
            background: linear-gradient(135deg, #a53232 0%, #8a2525 100%);
            color: white;
        }
        
        /* 内容区 */
        .container {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .section {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }
        .section.active { display: flex; }
        
        /* 聊天界面 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        
        .chat-message {
            display: flex;
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            margin-right: 10px;
        }
        .bot-message .message-avatar { background: #f0e8d8; }
        .user-message .message-avatar { background: #8a2525; color: white; }
        
        .message-content { flex: 1; max-width: calc(100% - 50px); }
        
        .message-bubble {
            padding: 12px 15px;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.6;
        }
        .bot-message .message-bubble {
            background: #fffdf8;
            border: 1px solid #d4c4b0;
            border-top-left-radius: 4px;
        }
        .user-message .message-bubble {
            background: linear-gradient(135deg, #a53232 0%, #8a2525 100%);
            color: white;
            border-top-right-radius: 4px;
            margin-left: auto;
            max-width: 80%;
        }
        .user-message { flex-direction: row-reverse; }
        .user-message .message-avatar { margin-right: 0; margin-left: 10px; }
        .user-message .message-content { display: flex; justify-content: flex-end; }
        
        .message-time {
            font-size: 11px;
            color: #8b7355;
            margin-top: 4px;
            padding: 0 5px;
        }
        
        /* AI思考过程 - 强制显示，不可关闭 */
        .thinking-process {
            background: #f7f3e9;
            border-radius: 2px;
            padding: 15px;
            margin-top: 10px;
            border-left: 3px solid #a53232;
        }
        .thinking-title {
            font-weight: bold;
            color: #8a2525;
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .thinking-step {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
            padding: 8px;
            background: #fffdf8;
            border-radius: 2px;
            font-size: 13px;
        }
        .step-number {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #a53232;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .step-content { flex: 1; }
        .step-name { font-weight: 500; color: #2b2b2b; margin-bottom: 2px; }
        .step-desc { color: #5a5a5a; font-size: 12px; }
        .step-time { color: #8b7355; font-size: 11px; margin-top: 2px; }
        .step-status {
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 11px;
            flex-shrink: 0;
        }
        .status-completed { background: #f0e8d8; color: #a53232; }
        .status-running { background: #f7f3e9; color: #b8860b; }
        .status-failed { background: #f7f3e9; color: #a53232; }
        
        .thinking-summary {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #d4c4b0;
            font-size: 12px;
            color: #5a5a5a;
            display: flex;
            justify-content: space-between;
        }
        
        /* 输入区 */
        .chat-input-area {
            background: #fffdf8;
            border-top: 1px solid #d4c4b0;
            padding: 10px 15px;
            flex-shrink: 0;
        }
        .quick-symptoms {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .quick-symptoms::-webkit-scrollbar { display: none; }
        .quick-tag {
            padding: 6px 14px;
            background: #efe8d8;
            border-radius: 4px;
            font-size: 13px;
            color: #5a5a5a;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            border: none;
        }
        .quick-tag:hover {
            background: #f0e8d8;
            color: #a53232;
        }
        
        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .chat-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #d4c4b0;
            border-radius: 4px;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
            max-height: 120px;
        }
        .chat-input:focus { border-color: #a53232; }
        .send-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #a53232 0%, #8a2525 100%);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .send-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(165, 50, 50, 0.3); }
        .send-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        
        /* 加载动画 */
        .loading-dots {
            display: flex;
            gap: 4px;
            padding: 10px 0;
        }
        .loading-dots span {
            width: 8px;
            height: 8px;
            background: #a53232;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite both;
        }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        /* 结果卡片 */
        .result-card {
            background: #f7f3e9;
            border-radius: 2px;
            padding: 15px;
            margin-top: 10px;
        }
        .result-constitution {
            display: inline-block;
            background: linear-gradient(135deg, #a53232 0%, #8a2525 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .result-section-title {
            font-weight: bold;
            color: #a53232;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .result-section-content {
            color: #5a5a5a;
            line-height: 1.8;
            font-size: 14px;
        }
        
        /* 溯源 */
        .source-item {
            background: #fffdf8;
            border-left: 3px solid #a53232;
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 0 6px 6px 0;
        }
        .source-book {
            font-weight: bold;
            color: #a53232;
            font-size: 13px;
        }
        .source-text {
            color: #5a5a5a;
            font-size: 12px;
            margin-top: 4px;
        }
        .source-original {
            color: #8b7355;
            font-size: 11px;
            font-style: italic;
            margin-top: 4px;
            background: #f7f3e9;
            padding: 6px;
            border-radius: 2px;
        }
        
        /* 推荐商品 */
        .product-recommend {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
        }
        .product-recommend::-webkit-scrollbar { display: none; }
        .product-mini {
            min-width: 140px;
            background: #fffdf8;
            border-radius: 2px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(43, 27, 18, 0.12);
        }
        .product-mini-icon { font-size: 32px; margin-bottom: 6px; }
        .product-mini-name { font-size: 13px; font-weight: bold; color: #2b2b2b; margin-bottom: 4px; }
        .product-mini-price { color: #a53232; font-size: 15px; font-weight: bold; }
        .product-mini-tag {
            font-size: 11px;
            color: #a53232;
            background: #f0e8d8;
            padding: 2px 8px;
            border-radius: 2px;
            margin-top: 6px;
            display: inline-block;
        }
        
        /* 警告 */
        .warning-box {
            background: #f7f3e9;
            border: 1px solid #d4c4b0;
            border-radius: 2px;
            padding: 12px;
            margin-top: 12px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .warning-icon { font-size: 16px; }
        .warning-text { color: #8b7355; font-size: 12px; line-height: 1.5; }
        
        /* 其他页面 */
        .page-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        .card {
            background: #fffdf8;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(43, 27, 18, 0.12);
        }
        .card-title {
            font-size: 18px;
            font-weight: bold;
            color: #8a2525;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0e8d8;
        }
        
        /* 搜索 */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #d4c4b0;
            border-radius: 2px;
            font-size: 16px;
            outline: none;
        }
        .search-input:focus { border-color: #a53232; }
        .search-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #a53232 0%, #8a2525 100%);
            color: white;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-size: 16px;
        }
        
        /* 商品 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .product-card {
            background: #fffdf8;
            border-radius: 2px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(43, 27, 18, 0.12);
            transition: transform 0.3s;
        }
        .product-card:hover { transform: translateY(-3px); }
        .product-img {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #f0e8d8 0%, #d4c4b0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        .product-info { padding: 15px; }
        .product-name { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .product-source { font-size: 12px; color: #8b7355; margin-bottom: 8px; }
        .product-price { color: #a53232; font-size: 20px; font-weight: bold; }
        .product-original { color: #8b7355; text-decoration: line-through; font-size: 14px; margin-left: 8px; }
        .product-tag {
            display: inline-block;
            font-size: 12px;
            color: #a53232;
            background: #f0e8d8;
            padding: 4px 10px;
            border-radius: 2px;
            margin-top: 8px;
        }
        
        /* JSON */
        .json-viewer {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 2px;
            overflow-x: auto;
            font-family: 'SFMono-Regular', 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
        }
        .json-key { color: #9cdcfe; }
        .json-string { color: #ce9178; }
        .json-number { color: #b5cea8; }
        
        /* 响应式 */
        @media (max-width: 600px) {
            .header h1 { font-size: 18px; }
            .nav-btn { padding: 5px 12px; font-size: 12px; }
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .chat-input { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌿 小神农中医AI</h1>
        <div class="subtitle">纯古籍权威数据 · 100%可溯源 · 零幻觉</div>
        <div class="api-status disconnected" id="apiStatus">API连接中...</div>
    </div>
    
    <div class="nav">
        <button class="nav-btn active" onclick="showSection('diagnosis')">AI辨证</button>
        <button class="nav-btn" onclick="showSection('search')">古籍检索</button>
        <button class="nav-btn" onclick="showSection('products')">养生商城</button>
        <button class="nav-btn" onclick="showSection('api')">API测试</button>
    </div>
    
    <div class="container">
        <!-- AI辨证 - 对话框模式 -->
        <div class="section active" id="section-diagnosis">
            <div class="chat-container" id="chatContainer">
                <!-- 欢迎消息 -->
                <div class="chat-message bot-message">
                    <div class="message-avatar">🌿</div>
                    <div class="message-content">
                        <div class="message-bubble">
                            <p>您好，我是小神农AI助手。</p>
                            <p style="margin-top: 8px;">请直接描述您目前的症状，比如：</p>
                            <ul style="margin-top: 8px; padding-left: 20px; color: #5a5a5a;">
                                <li>"我最近头痛发热，怕冷，没有汗"</li>
                                <li>"失眠多梦，口干舌燥，手心发热"</li>
                                <li>"腹胀腹泻，食欲不振，乏力"</li>
                            </ul>
                            <p style="margin-top: 10px; font-size: 12px; color: #8b7355;">
                                ⚠️ 本结果仅供参考，不能替代专业医生诊断
                            </p>
                        </div>
                        <div class="message-time">刚刚</div>
                    </div>
                </div>
            </div>
            
            <!-- 输入区 -->
            <div class="chat-input-area">
                <div class="quick-symptoms">
                    <span class="quick-tag" onclick="sendQuickMessage('头痛发热，怕冷，没有汗')">头痛发热</span>
                    <span class="quick-tag" onclick="sendQuickMessage('失眠多梦，口干')">失眠多梦</span>
                    <span class="quick-tag" onclick="sendQuickMessage('腹胀腹泻，食欲不振')">腹胀腹泻</span>
                    <span class="quick-tag" onclick="sendQuickMessage('咳嗽，咽痛，发热')">咳嗽咽痛</span>
                    <span class="quick-tag" onclick="sendQuickMessage('腰痛，关节痛，乏力')">腰痛关节痛</span>
                </div>
                <div class="input-row">
                    <textarea 
                        class="chat-input" 
                        id="chatInput" 
                        placeholder="请描述您的症状，越详细越好..."
                        rows="1"
                        oninput="autoResize(this)"
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                    <button class="send-btn" onclick="sendMessage()" id="sendBtn">发送</button>
                </div>
            </div>
        </div>
        
        <!-- 古籍检索 -->
        <div class="section" id="section-search">
            <div class="page-content">
                <div class="card">
                    <div class="card-title">🔍 古籍知识检索</div>
                    <div class="search-box">
                        <input type="text" class="search-input" id="searchInput" placeholder="输入中医术语，如：麻黄汤、风寒感冒、气虚..." onkeypress="if(event.key==='Enter') searchKnowledge()">
                        <button class="search-btn" onclick="searchKnowledge()">检索</button>
                    </div>
                    <div id="searchResults"></div>
                </div>
            </div>
        </div>
        
        <!-- 养生商城 -->
        <div class="section" id="section-products">
            <div class="page-content">
                <div class="card">
                    <div class="card-title">🍵 药食同源养生方</div>
                    <p style="color: #5a5a5a; margin-bottom: 15px;">根据中国中医科学院配方监制</p>
                    <div class="product-grid" id="productGrid"></div>
                </div>
            </div>
        </div>
        
        <!-- API测试 -->
        <div class="section" id="section-api">
            <div class="page-content">
                <div class="card">
                    <div class="card-title">🔧 API接口测试</div>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; color: #5a5a5a;">API地址</label>
                        <input type="text" class="search-input" id="apiBase" value="http://localhost:5001">
                    </div>
                    <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                        <button class="search-btn" onclick="testHealth()">测试健康</button>
                        <button class="search-btn" onclick="testDiagnosis()">测试辨证</button>
                        <button class="search-btn" onclick="testRetrieve()">测试检索</button>
                        <button class="search-btn" onclick="testProducts()">测试商品</button>
                    </div>
                    <div class="json-viewer" id="apiResponse">点击上方按钮测试API...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://127.0.0.1:5001';  // 使用127.0.0.1避免Privoxy代理拦截
        let isProcessing = false;
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            checkAPIStatus();
            loadProducts();
        });
        
        // 检查API状态
        async function checkAPIStatus() {
            const statusEl = document.getElementById('apiStatus');
            try {
                const resp = await fetch(`${API_BASE}/api/health`, { method: 'GET' });
                if (resp.ok) {
                    const data = await resp.json();
                    statusEl.textContent = `API已连接 | 知识库: ${data.rag_stats.total_documents}条`;
                    statusEl.className = 'api-status connected';
                } else {
                    throw new Error('API error');
                }
            } catch (e) {
                statusEl.textContent = 'API未连接 - 请启动后端服务';
                statusEl.className = 'api-status disconnected';
            }
        }
        
        // 切换页面
        function showSection(name) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`section-${name}`).classList.add('active');
            event.target.classList.add('active');
        }
        
        // 自动调整输入框高度
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }
        
        // 回车发送
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        // 发送快捷消息
        function sendQuickMessage(text) {
            document.getElementById('chatInput').value = text;
            sendMessage();
        }
        
        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            
            if (!text || isProcessing) return;
            
            // 添加用户消息
            addUserMessage(text);
            input.value = '';
            input.style.height = 'auto';
            
            // 显示加载（带思考过程）- 强制显示
            showThinkingProcess();
            isProcessing = true;
            document.getElementById('sendBtn').disabled = true;
            
            try {
                const resp = await fetch(`${API_BASE}/api/diagnosis`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symptoms: text })
                });
                
                const data = await resp.json();
                hideThinkingProcess();
                
                if (data.success) {
                    addDiagnosisResult(data.data);
                } else {
                    addBotMessage(`抱歉，辨证失败：${data.error || '请稍后重试'}`);
                }
            } catch (e) {
                hideThinkingProcess();
                addBotMessage('抱歉，连接失败。请确保后端服务已启动（python api_server.py）');
            } finally {
                isProcessing = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        function addUserMessage(text) {
            const container = document.getElementById('chatContainer');
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            
            container.innerHTML += `
                <div class="chat-message user-message">
                    <div class="message-avatar">👤</div>
                    <div class="message-content">
                        <div class="message-bubble">${escapeHtml(text)}</div>
                        <div class="message-time">${time}</div>
                    </div>
                </div>
            `;
            scrollToBottom();
        }

        let thinkingTimer = null;
        let thinkingStartTime = 0;
        
        function startThinkingTimer() {
            thinkingStartTime = Date.now();
            thinkingTimer = setInterval(() => {
                const elapsed = Date.now() - thinkingStartTime;
                const timeEl = document.getElementById('thinkingTime');
                if (timeEl) {
                    timeEl.textContent = `耗时: ${elapsed}ms`;
                }
            }, 100);
        }
        
        function hideThinkingProcess() {
            if (thinkingTimer) {
                clearInterval(thinkingTimer);
                thinkingTimer = null;
            }
            const thinking = document.getElementById('thinkingMessage');
            if (thinking) thinking.remove();
        }

                                <!-- v2.2新增：相似患者参照 -->
                                <div style="margin-bottom: 12px;">
                                    <div class="result-section-title">👥 相似患者参照</div>
                                    ${renderSimilarPatients(data.similar_patients)}
                                </div>
                                
                                <!-- v2.2新增：知识缺口与入库建议 -->
                                <div style="margin-bottom: 12px;">
                                    <div class="result-section-title">📚 知识缺口与入库建议</div>
                                    ${renderKnowledgeGaps(data.knowledge_gap_report, data.import_suggestions)}
                                </div>
                                
                                <div style="margin-bottom: 12px;">
                                    <div class="result-section-title">⚠️ 禁忌提醒</div>

                                </div>
                                
                                ${productsHtml ? `
                                <div style="margin-bottom: 12px;">
                                    <div class="result-section-title">🍵 推荐养生方</div>
                                    <div class="product-recommend">${productsHtml}</div>
                                </div>
                                ` : ''}
                                
                                <div class="warning-box">
                                    <span class="warning-icon">⚠️</span>
                                    <span class="warning-text">${data.warning || '本结果仅供参考，不能替代专业医生诊断。如有不适，请及时就医。'}</span>
                                </div>
                            </div>

        }
        
        // ========== v2.2 批判性思维渲染函数 ==========
        
        function renderCredibilityAssessment(assessments) {
            if (!assessments || assessments.length === 0) {
                return '<p style="color: #8b7355; font-size: 12px;">暂无可信度评估数据</p>';
            }
            
            const gradeColors = {
                'A': '#4a7c59', 'A-': '#4a7c59',
                'B+': '#4a7c59', 'B': '#4a7c59', 'B-': '#4a7c59',
                'C+': '#b8860b', 'C': '#b8860b', 'C-': '#d4a84b',
                'D+': '#b8860b', 'D': '#b8860b', 'D-': '#b8860b',
                'F': '#a53232'
            };
            
            return assessments.map((a, i) => {
                const grade = a.overall_grade || 'N/A';
                const color = gradeColors[grade] || '#8b7355';
                const score = a.overall_score !== undefined ? a.overall_score : 0;
                
                return `
                    <div style="background: #f7f3e9; border-radius: 8px; padding: 10px; margin-bottom: 8px; border-left: 3px solid ${color};">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                            <div style="font-weight: bold; font-size: 13px; color: #2b2b2b;">
                                来源 ${i+1}: ${a.source_type || '古籍'}
                            </div>
                            <div style="background: ${color}20; color: ${color}; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: bold;">
                                ${grade} (${score}分)
                            </div>
                        </div>
                        <div style="color: #5a5a5a; font-size: 12px; line-height: 1.6;">
                            <div>📚 文献质量: ${a.literature_quality?.grade || 'N/A'} | 年代: ${a.literature_quality?.era || '未知'}</div>
                            <div>🔬 临床验证: ${a.clinical_validation?.grade || 'N/A'} | 样本量: ${a.clinical_validation?.sample_size || 'N/A'}</div>
                            <div>🔗 交叉验证: ${a.cross_validation?.grade || 'N/A'} | 一致性: ${a.cross_validation?.consistency_score || 'N/A'}</div>
                            ${a.red_flags && a.red_flags.length > 0 ? `
                                <div style="color: #a53232; margin-top: 4px;">⚠️ 红旗: ${a.red_flags.join('、')}</div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderCooccurrenceAnalysis(analysis) {
            if (!analysis || Object.keys(analysis).length === 0) {
                return '<p style="color: #8b7355; font-size: 12px;">暂无共现分析数据</p>';
            }
            
            const pairs = analysis.cooccurrence_pairs || [];
            const anomalies = analysis.anomalies || [];
            
            let html = '';
            
            // 正常共现
            if (pairs.length > 0) {
                html += `<div style="margin-bottom: 8px;"><div style="font-size: 12px; color: #5a5a5a; font-weight: bold; margin-bottom: 4px;">✅ 正常症状共现</div>`;
                html += pairs.slice(0, 3).map(p => `
                    <div style="display: inline-block; background: #f7f3e9; color: #2b2b2b; padding: 3px 8px; border-radius: 8px; margin: 2px; font-size: 11px;">
                        ${p.symptom_a_name} + ${p.symptom_b_name} (强度: ${p.cooccurrence_strength?.toFixed(2) || 'N/A'})
                    </div>
                `).join('');
                html += '</div>';
            }
            
            // 异常共现警报
            if (anomalies.length > 0) {
                html += `<div style="margin-bottom: 8px;"><div style="font-size: 12px; color: #a53232; font-weight: bold; margin-bottom: 4px;">🚨 异常共现警报</div>`;
                html += anomalies.map(a => `
                    <div style="background: #fdf2f2; border-radius: 6px; padding: 8px; margin-bottom: 6px; font-size: 12px;">
                        <div style="font-weight: bold; color: #a53232;">${a.symptom_a_name} + ${a.symptom_b_name}</div>
                        <div style="color: #5a5a5a; margin-top: 2px;">预期强度: ${a.expected_cooccurrence?.toFixed(2) || 'N/A'} | 实际: ${a.actual_cooccurrence?.toFixed(2) || 'N/A'} | 偏差: ${a.deviation?.toFixed(2) || 'N/A'}</div>
                        <div style="color: #8b7355; font-size: 11px; margin-top: 2px;">⚠️ 可能提示：药物副作用或并发症，建议医师重点排查</div>
                    </div>
                `).join('');
                html += '</div>';
            }
            
            return html || '<p style="color: #8b7355; font-size: 12px;">共现分析完成，无异常</p>';
        }
        
        function renderAdverseDetection(detection) {
            if (!detection || Object.keys(detection).length === 0) {
                return '<p style="color: #8b7355; font-size: 12px;">暂无副作用检测数据</p>';
            }
            
            const events = detection.adverse_events || [];
            const riskLevel = detection.risk_level || '未知';
            const riskColors = { '低风险': '#4a7c59', '中风险': '#b8860b', '高风险': '#b8860b', '极高风险': '#a53232' };
            
            let html = `<div style="margin-bottom: 8px;">
                <div style="display: inline-block; background: ${riskColors[riskLevel] || '#8b7355'}20; color: ${riskColors[riskLevel] || '#8b7355'}; padding: 3px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; margin-bottom: 8px;">
                    综合风险等级: ${riskLevel}
                </div>
            </div>`;
            
            if (events.length > 0) {
                html += events.map(e => `
                    <div style="background: ${e.severity === '严重' ? '#fdf2f2' : e.severity === '中等' ? '#fffdf8' : '#f7f3e9'}; border-radius: 6px; padding: 8px; margin-bottom: 6px; font-size: 12px; border-left: 3px solid ${e.severity === '严重' ? '#a53232' : e.severity === '中等' ? '#b8860b' : '#8b7355'};">
                        <div style="font-weight: bold; color: #2b2b2b;">${e.adverse_type} <span style="font-size: 11px; color: #8b7355;">[${e.severity}]</span></div>
                        <div style="color: #5a5a5a; margin-top: 2px;">涉及药物: ${e.related_drugs?.join('、') || '未知'}</div>
                        <div style="color: #5a5a5a;">时间窗口: ${e.time_window || '未知'}</div>
                        ${e.recommendation ? `<div style="color: #4a7c59; margin-top: 4px;">💡 建议: ${e.recommendation}</div>` : ''}
                    </div>
                `).join('');
            } else {
                html += '<div style="color: #4a7c59; font-size: 12px;">✅ 未检测到明显不良反应信号</div>';
            }
            
            return html;
        }
        
        function renderSimilarPatients(patients) {
            if (!patients || patients.length === 0) {
                return '<p style="color: #8b7355; font-size: 12px;">暂无相似患者数据</p>';
            }
            
            return patients.map((p, i) => `
                <div style="background: #f7f3e9; border-radius: 8px; padding: 10px; margin-bottom: 8px; border-left: 3px solid #4a7c59;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                        <div style="font-weight: bold; font-size: 13px; color: #2b2b2b;">
                            👤 相似患者 ${p.patient_id || '匿名'} 
                            <span style="font-size: 11px; color: #8b7355;">(相似度: ${(p.similarity_score * 100).toFixed(1) || 'N/A'}%)</span>
                        </div>
                    </div>
                    <div style="color: #5a5a5a; font-size: 12px; line-height: 1.6;">
                        <div>症状重叠: ${p.shared_symptoms?.join('、') || 'N/A'}</div>
                        <div>处方: ${p.prescription || 'N/A'}</div>
                        <div>疗效: ${p.outcome || 'N/A'}</div>
                        ${p.adjustment_suggestion ? `<div style="color: #4a7c59; margin-top: 4px;">💡 调整建议: ${p.adjustment_suggestion}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        function renderKnowledgeGaps(gaps, suggestions) {
            let html = '';
            
            if (gaps && gaps.length > 0) {
                html += `<div style="margin-bottom: 8px;"><div style="font-size: 12px; color: #b8860b; font-weight: bold; margin-bottom: 4px;">⚠️ 知识缺口</div>`;
                html += gaps.map(g => `
                    <div style="background: #fffdf8; border-radius: 6px; padding: 8px; margin-bottom: 6px; font-size: 12px;">
                        <div style="font-weight: bold; color: #b8860b;">[${g.severity || '中'}] ${g.type}</div>
                        <div style="color: #5a5a5a; margin-top: 2px;">${g.description}</div>
                        <div style="color: #8b7355; font-size: 11px; margin-top: 2px;">建议: ${g.suggested_action || '待补充'}</div>
                    </div>
                `).join('');
                html += '</div>';
            }
            
            if (suggestions && suggestions.length > 0) {
                html += `<div style="margin-bottom: 8px;"><div style="font-size: 12px; color: #4a7c59; font-weight: bold; margin-bottom: 4px;">📥 入库建议</div>`;
                html += suggestions.map(s => `
                    <div style="background: #f7f3e9; border-radius: 6px; padding: 8px; margin-bottom: 6px; font-size: 12px;">
                        <div style="font-weight: bold; color: #2b2b2b;">[${s.priority || '中'}] ${s.type}</div>
                        <div style="color: #5a5a5a; margin-top: 2px;">${s.description}</div>
                        <div style="color: #8b7355; font-size: 11px; margin-top: 2px;">来源: ${s.suggested_source || '待检索'}</div>
                    </div>
                `).join('');
                html += '</div>';
            }
            
            return html || '<p style="color: #8b7355; font-size: 12px;">暂无知识缺口或入库建议</p>';
        }

        // 古籍检索

        async function apiRequest(method, path, body) {
            const base = document.getElementById('apiBase').value || API_BASE;
            const responseEl = document.getElementById('apiResponse');
            responseEl.textContent = '请求中...';
            
            try {
                const options = {
                    method: method,
                    headers: { 'Content-Type': 'application/json' }
                };
                if (body) options.body = JSON.stringify(body);
                
                const resp = await fetch(`${base}${path}`, options);
                const data = await resp.json();
                responseEl.innerHTML = syntaxHighlight(data);
            } catch (e) {
                responseEl.textContent = `错误: ${e.message}`;
            }
        }
        
        function syntaxHighlight(json) {
            if (typeof json !== 'string') json = JSON.stringify(json, null, 2);
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?)/g, function(match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) cls = 'json-key';
                    else cls = 'json-string';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }
